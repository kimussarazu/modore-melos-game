<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戻れメロス - 帰宅ランゲーム</title>
    <style>
        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 18px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
            overflow: hidden;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameContainer {
            position: relative;
            width: min(calc(100vw - 8px), 920px);
            height: min(calc(100vh - 8px), 920px);
            background: #000;
            border: 8px solid #444;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }

        #startScreen {
            background: #2c1810;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 10px 20px;
            position: relative;
        }

        #gameOverScreen, #winScreen {
            display: none;
            background: rgba(0, 0, 0, 0.9);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 40px;
            text-shadow: 4px 4px 0px #000;
            color: #ffd700;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #ff4444;
        }

        button {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 1em;
            padding: 15px 30px;
            background: #e1452d;
            color: white;
            border: 4px solid #000;
            cursor: pointer;
            margin: 10px;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.1s;
        }

        button:hover {
            background: #ff5544;
        }

        button:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #000;
        }

        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.92em;
            color: #ffd700;
            text-shadow: 2px 2px 0px #000;
            z-index: 5;
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
        }

        #muteButton {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 6;
            font-size: 0.6em;
            padding: 10px 12px;
            margin: 0;
            background: #2c2c2c;
            border-width: 3px;
            box-shadow: 4px 4px 0px #000;
        }

        #muteButton:hover {
            background: #3a3a3a;
        }

        #instructions {
            font-size: 0.78em;
            margin: 30px;
            text-align: center;
            max-width: 600px;
            line-height: 2;
            color: #ddd;
        }

        #chatBoard {
            width: min(92%, 680px);
            margin: 8px 0 14px;
            background: rgba(0, 0, 0, 0.55);
            border: 4px solid #3c3c3c;
            box-shadow: 4px 4px 0 #000;
            padding: 10px;
            color: #f3f3f3;
        }

        #chatBoardContent {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            position: relative;
        }

        #chatMain {
            flex: 1;
            min-width: 0;
            padding-right: 164px;
        }

        #creatorLetter {
            position: absolute;
            top: -6px;
            right: -2px;
            width: 146px;
            min-height: 110px;
            padding: 8px;
            background: rgba(245, 236, 200, 0.9);
            border: 3px solid #7b6b3f;
            color: #2a1f12;
            box-shadow: 3px 4px 0 #000;
            font-size: 0.56em;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            transform: rotate(1.6deg);
            z-index: 2;
        }

        #creatorLetter::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            width: 34px;
            height: 10px;
            transform: translateX(-50%) rotate(-4deg);
            background: rgba(240, 225, 165, 0.8);
            border: 1px solid #8e7c47;
        }

        #creatorLetterTitle {
            font-size: 0.86em;
            margin-bottom: 5px;
            color: #593d1f;
        }

        #chatTitle {
            color: #ffd700;
            font-size: 0.66em;
            margin-bottom: 8px;
        }

        #chatStatus {
            color: #b8e986;
            font-size: 0.56em;
            margin-bottom: 6px;
            min-height: 10px;
        }

        #chatMessages {
            height: 120px;
            overflow-y: auto;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #202020;
            padding: 6px;
            font-size: 0.68em;
            line-height: 1.5;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .chatMessage {
            margin-bottom: 4px;
            color: #f5f5f5;
        }

        .chatMeta {
            color: #9ecfff;
        }

        .chatActions {
            margin-left: 6px;
        }

        .chatActionBtn {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 0.48em;
            padding: 3px 5px;
            margin-left: 4px;
            background: #2f2f2f;
            color: #fff;
            border: 1px solid #000;
            cursor: pointer;
        }

        #chatControls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chatInput {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            border: 2px solid #2b2b2b;
            background: #141414;
            color: #fff;
            padding: 6px;
            font-size: 0.75em;
            outline: none;
        }

        #chatNameInput {
            width: 120px;
        }

        #chatInput {
            flex: 1;
            min-width: 180px;
        }

        #chatSendButton {
            font-size: 0.58em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #2f5ea8;
        }

        #chatRefreshButton {
            font-size: 0.58em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #4b4b4b;
        }

        #characterButton {
            position: absolute;
            top: 58px;
            right: 12px;
            z-index: 11;
            font-size: 0.56em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #6a3cc4;
        }

        #characterPanel {
            position: absolute;
            top: 96px;
            right: 12px;
            z-index: 11;
            width: 168px;
            background: rgba(12, 12, 22, 0.94);
            border: 3px solid #4b4b7a;
            box-shadow: 4px 4px 0 #000;
            padding: 8px;
            display: none;
        }

        #characterPanelTitle {
            color: #ffd700;
            font-size: 0.56em;
            margin-bottom: 6px;
        }

        .characterOptionBtn {
            width: 100%;
            margin: 4px 0;
            font-size: 0.52em;
            padding: 7px 6px;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #343454;
            text-align: left;
        }

        .characterOptionBtn.active {
            background: #e1452d;
        }

        #backToTitleFromGameOver {
            background: #4b4b4b;
        }

        #backToTitleFromGameOver:hover {
            background: #5d5d5d;
        }

        #difficultySelector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficultyLabel {
            font-size: 0.66em;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
        }

        .difficultyBtn {
            font-size: 0.62em;
            padding: 8px 10px;
            margin: 0;
            border-width: 3px;
            box-shadow: 3px 3px 0 #000;
            background: #2c2c2c;
        }

        .difficultyBtn.active {
            background: #e1452d;
        }

        #pixelArt {
            margin: 30px 0;
            width: 300px;
            height: 200px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2em;
            }
            button {
                font-size: 0.8em;
                padding: 12px 25px;
            }
            #instructions {
                font-size: 0.6em;
                margin: 20px;
            }
            #chatBoard {
                width: 95%;
                padding: 8px;
            }
            #chatBoardContent {
                flex-direction: column;
            }
            #chatMain {
                padding-right: 0;
            }
            #creatorLetter {
                position: static;
                width: 100%;
                min-height: 74px;
                transform: none;
                margin-top: 4px;
            }
            #creatorLetter::before {
                display: none;
            }
            #chatMessages {
                height: 100px;
            }
            #chatNameInput {
                width: 100px;
            }
            #chatInput {
                min-width: 120px;
            }
            #difficultySelector {
                margin-bottom: 10px;
                gap: 6px;
            }
            #pixelArt {
                width: 200px;
                height: 130px;
            }
            #gameContainer {
                border-width: 4px;
            }
            #startScreen {
                justify-content: flex-start;
                padding-top: 10px;
                padding-bottom: 28px;
            }
            #muteButton {
                font-size: 0.55em;
                padding: 8px 10px;
            }
            #characterButton {
                top: 52px;
                font-size: 0.5em;
            }
            #characterPanel {
                top: 88px;
                width: 158px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="score">残り: 0m</div>
        <button id="muteButton">SOUND: ON</button>
        
        <div id="startScreen">
            <canvas id="pixelArt" width="300" height="200"></canvas>
            <h1>戻れメロス</h1>
            <div id="instructions">
                メロスは家に帰らなければならない<br><br>
                PC: スペースでジャンプ（2段まで）<br>
                スマホ: 画面タップでジャンプ（2段まで）<br>
                長押しでジャンプが少しだけ伸びる<br>
                障害物を避けながら家へ急げ！
            </div>
            <div id="difficultySelector">
                <span class="difficultyLabel">難易度</span>
                <button id="easyButton" class="difficultyBtn">EASY</button>
                <button id="normalButton" class="difficultyBtn active">NORMAL</button>
                <button id="hardButton" class="difficultyBtn">HARD</button>
            </div>
            <button id="startButton">スタート</button>
            <div id="chatBoard">
                <div id="chatTitle">歴代メロスの掲示板</div>
                <div id="chatStatus">接続準備中...</div>
                <div id="chatBoardContent">
                    <div id="chatMain">
                        <div id="chatMessages"></div>
                        <div id="chatControls">
                            <input id="chatNameInput" class="chatInput" maxlength="12" placeholder="名前">
                            <input id="chatInput" class="chatInput" maxlength="80" placeholder="メッセージ（80字まで）">
                            <button id="chatSendButton">送信</button>
                            <button id="chatRefreshButton">更新</button>
                        </div>
                    </div>
                    <div id="creatorLetter">
                        <div id="creatorLetterTitle">つくりて からの てがみ</div>
                        <div id="creatorLetterBody">（まだ ありません）</div>
                    </div>
                </div>
            </div>
            <button id="characterButton">キャラチェンジ</button>
            <div id="characterPanel">
                <div id="characterPanelTitle">キャラをえらぶ</div>
                <button class="characterOptionBtn" data-char="vo">Vo.Gt 石田 想太朗</button>
                <button class="characterOptionBtn" data-char="key">Key. 小川 誠太</button>
                <button class="characterOptionBtn" data-char="ba">Ba. 木村 優太</button>
                <button class="characterOptionBtn" data-char="dr">Dr. ぐら</button>
            </div>
        </div>

        <div id="gameOverScreen">
            <h2>ゲームオーバー</h2>
            <div id="finalScore"></div>
            <button id="restartButton">もう一度</button>
            <button id="backToTitleFromGameOver">タイトルへ</button>
        </div>

        <div id="winScreen">
            <h2 style="color: #ffd700;">おめでとう！</h2>
            <div id="winMessage"></div>
            <button id="winRestartButton">もう一度</button>
            <button id="backToTitleFromWin">タイトルへ</button>
        </div>
    </div>

    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script>
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pixelArtCanvas = document.getElementById('pixelArt');
        const pixelCtx = pixelArtCanvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const winRestartButton = document.getElementById('winRestartButton');
        const backToTitleFromGameOver = document.getElementById('backToTitleFromGameOver');
        const backToTitleFromWin = document.getElementById('backToTitleFromWin');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const winMessage = document.getElementById('winMessage');
        const muteButton = document.getElementById('muteButton');
        const easyButton = document.getElementById('easyButton');
        const normalButton = document.getElementById('normalButton');
        const hardButton = document.getElementById('hardButton');
        const chatStatus = document.getElementById('chatStatus');
        const chatMessages = document.getElementById('chatMessages');
        const chatNameInput = document.getElementById('chatNameInput');
        const chatInput = document.getElementById('chatInput');
        const chatSendButton = document.getElementById('chatSendButton');
        const chatRefreshButton = document.getElementById('chatRefreshButton');
        const creatorLetterBody = document.getElementById('creatorLetterBody');
        const characterButton = document.getElementById('characterButton');
        const characterPanel = document.getElementById('characterPanel');
        const characterOptionButtons = Array.from(document.querySelectorAll('.characterOptionBtn'));

        // Pixel art rendering
        ctx.imageSmoothingEnabled = false;
        pixelCtx.imageSmoothingEnabled = false;

        // Canvas size（縦画面でも圧縮せず、表示領域に合わせる）
        function resizeCanvas() {
            const width = Math.max(360, Math.floor(gameContainer.clientWidth));
            const height = Math.max(500, Math.floor(gameContainer.clientHeight));
            canvas.width = width;
            canvas.height = height;
            const isPortrait = height > width * 1.05;
            BASE_GROUND_Y = isPortrait
                ? Math.floor(canvas.height * 0.64)
                : (canvas.height - 120);
            player.x = Math.floor(canvas.width * 0.67);
            player.y = Math.min(player.y, BASE_GROUND_Y - player.height);
            ctx.imageSmoothingEnabled = false;
        }

        // Game state
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let gameSpeed = 4;
        let frameCount = 0;
        const GOAL_DISTANCE_METERS = 1500;
        const PIXELS_PER_METER = 4;
        const HOME_START_X = -(GOAL_DISTANCE_METERS * PIXELS_PER_METER);
        let terrainScroll = 0;
        let jumpHeld = false;
        let BASE_GROUND_Y = 480;
        const CHASER_WARNING_LEAD = 64;
        let pendingChaserWave = null;
        let chaserWarningTimer = 0;
        let deathCause = '';
        let kingSpawned = false;
        let selectedDifficulty = 'normal';
        let currentDifficulty = null;
        const CHARACTER_STORAGE_KEY = 'melos_character_id';
        const CHARACTERS = {
            vo: { label: 'Vo.Gt 石田 想太朗', bodyColor: '#d07b3d', skinColor: '#f3c8a7', hairColor: '#171717', accentColor: '#222', accessory: 'mic' },
            key: { label: 'Key. 小川 誠太', bodyColor: '#d98fb0', skinColor: '#f1c4a4', hairColor: '#1b1b1b', accentColor: '#2f64c5', accessory: 'sword' },
            ba: { label: 'Ba. 木村 優太', bodyColor: '#b7aa5f', skinColor: '#eec3a1', hairColor: '#4a2f18', accentColor: '#8b5f2d', accessory: 'bass' },
            dr: { label: 'Dr. ぐら', bodyColor: '#d67757', skinColor: '#f2c5a8', hairColor: '#101015', accentColor: '#3f84c6', accessory: 'stick' }
        };
        let selectedCharacter = localStorage.getItem(CHARACTER_STORAGE_KEY) || 'vo';
        if (!CHARACTERS[selectedCharacter]) selectedCharacter = 'vo';
        const LOW_SPEC_MODE = window.matchMedia('(max-width: 900px)').matches;
        const PERF = {
            terrainStep: LOW_SPEC_MODE ? 12 : 8,
            groundStripeHeight: LOW_SPEC_MODE ? 14 : 18,
            textureStep: LOW_SPEC_MODE ? 24 : 16,
            textureSize: LOW_SPEC_MODE ? 6 : 8,
            maxProjectiles: LOW_SPEC_MODE ? 24 : 40,
            maxChasers: LOW_SPEC_MODE ? 7 : 12,
            textureFrameSkip: LOW_SPEC_MODE ? 2 : 1
        };
        const DIFFICULTIES = {
            easy: {
                label: 'EASY',
                startSpeed: 3.5,
                obstacleSpawnInterval: 100,
                archerFireInterval: 120,
                projectileSpeedBonus: 2.2,
                speedRampInterval: 750,
                maxSpeed: 7.2
            },
            normal: {
                label: 'NORMAL',
                startSpeed: 4,
                obstacleSpawnInterval: 80,
                archerFireInterval: 90,
                projectileSpeedBonus: 3,
                speedRampInterval: 600,
                maxSpeed: 8
            },
            hard: {
                label: 'HARD',
                startSpeed: 4.6,
                obstacleSpawnInterval: 65,
                archerFireInterval: 70,
                projectileSpeedBonus: 3.6,
                chaserSpawnInterval: 300,
                chaserSpeedBonus: 0.75,
                speedRampInterval: 520,
                maxSpeed: 8.8
            }
        };
        DIFFICULTIES.easy.chaserSpawnInterval = 500;
        DIFFICULTIES.easy.chaserSpeedBonus = 0.2;
        DIFFICULTIES.normal.chaserSpawnInterval = 390;
        DIFFICULTIES.normal.chaserSpeedBonus = 0.45;

        // サウンド管理（8bit風）
        const sound = {
            initialized: false,
            failed: false,
            muted: false,
            leadSynth: null,
            bassSynth: null,
            jumpSynth: null,
            hitSynth: null,
            goalSynth: null,
            loop: null,
            step: 0
        };

        // タイトル画面のリアルタイム掲示板
        const chatState = {
            initialized: false,
            pool: null,
            pubkey: '',
            seckey: null,
            messages: new Map(),
            maxMessages: 80,
            selfId: '',
            lastEnterAt: 0,
            pollingTimer: null,
            seenEventIds: new Set(),
            removedEventIds: new Set(),
            deleteClaims: new Map(),
            creatorLetter: '',
            creatorLetterTs: 0,
            adminPubkey: ''
        };
        const NOSTR_RELAYS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://relay.nostr.band'
        ];
        const NOSTR_ROOM_TAG = 'modore-melos-board-v1';
        const NOSTR_MOD_D = 'melos-moderation-v1';
        const NOSTR_LETTER_D = 'melos-creator-letter-v1';
        const ADMIN_PUBKEY_STORAGE_KEY = 'melos_admin_pubkey';
        const BOARD_RESET_TS = Date.parse('2026-03-04T09:08:00Z');

        // Player - Red Melos
        const player = {
            x: 540,
            y: 300,
            width: 32,
            height: 40,
            velocityY: 0,
            gravity: 0.6,
            jumpPower: -12.2,
            grounded: false,
            jumpsUsed: 0,
            maxJumps: 2,
            jumpHoldFrames: 0,
            maxJumpHoldFrames: 11,
            coyoteFrames: 0,
            maxCoyoteFrames: 7,
            jumpBufferFrames: 0,
            maxJumpBufferFrames: 8
        };

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Obstacles
        const obstacles = [];
        const projectiles = [];
        const chasers = [];
        const KING_BOSS = { name: 'king', width: 44, height: 60 };
        const obstacleTypes = [
            { name: 'soldier', width: 28, height: 44 },
            { name: 'villager', width: 24, height: 40 },
            { name: 'rock', width: 40, height: 32 },
            { name: 'tree', width: 36, height: 56 },
            { name: 'archer', width: 30, height: 44 }
        ];

        // Home (Goal)
        const home = {
            x: HOME_START_X,
            width: 104,
            height: 126
        };

        // Background elements
        const clouds = [];
        const cloudCount = LOW_SPEC_MODE ? 3 : 5;
        for (let i = 0; i < cloudCount; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: Math.random() * 150 + 20,
                width: 60 + Math.random() * 40,
                speed: 0.3 + Math.random() * 0.3
            });
        }

        // Stars for pixel art title screen
        const stars = [];
        for (let i = 0; i < 30; i++) {
            stars.push({
                x: Math.random() * pixelArtCanvas.width,
                y: Math.random() * pixelArtCanvas.height,
                size: Math.random() * 3 + 1
            });
        }

        // Draw pixel art title screen (MOTHER-inspired)
        function drawPixelArtTitle() {
            // Night sky background
            const gradient = pixelCtx.createLinearGradient(0, 0, 0, pixelArtCanvas.height);
            gradient.addColorStop(0, '#0a0a2e');
            gradient.addColorStop(0.5, '#1a1a4e');
            gradient.addColorStop(1, '#2c1810');
            pixelCtx.fillStyle = gradient;
            pixelCtx.fillRect(0, 0, pixelArtCanvas.width, pixelArtCanvas.height);

            // Twinkling stars
            stars.forEach(star => {
                const brightness = Math.sin(Date.now() * 0.002 + star.x) * 0.5 + 0.5;
                pixelCtx.fillStyle = `rgba(255, 255, 200, ${brightness})`;
                pixelCtx.fillRect(star.x, star.y, star.size, star.size);
            });

            // Ground
            pixelCtx.fillStyle = '#1a5f1a';
            pixelCtx.fillRect(0, 140, pixelArtCanvas.width, 60);

            // Path
            pixelCtx.fillStyle = '#8b7355';
            for (let i = 0; i < 300; i += 8) {

        // Input handling
        function jump() {
            if (!gameRunning) return;
            if (player.jumpsUsed >= player.maxJumps) return;
            if (player.jumpsUsed === 0 && !player.grounded && player.coyoteFrames <= 0) return;
            player.velocityY = player.jumpPower;
            player.jumpsUsed++;
            player.jumpHoldFrames = 0;
            player.jumpBufferFrames = 0;
            player.coyoteFrames = 0;
            playJumpSfx();
        }

        function requestJump() {
            const before = player.jumpsUsed;
            jump();
            if (before === player.jumpsUsed) {
                player.jumpBufferFrames = player.maxJumpBufferFrames;
            }
        }

        function getGroundLevelAt(screenX) {
            const worldX = screenX - terrainScroll;
            const waveA = Math.sin(worldX * 0.006) * 20;
            const waveB = Math.sin(worldX * 0.017 + 1.3) * 12;
            const stepped = Math.round((waveA + waveB) / 4) * 4;
            const offset = Math.max(-40, Math.min(44, stepped));
            return BASE_GROUND_Y + offset;
        }

        function drawTerrain() {
            // ピクセル感を維持しつつ描画負荷を抑える
            const step = PERF.terrainStep;
            const stripeH = PERF.groundStripeHeight;
            for (let x = 0; x < canvas.width; x += step) {
                const groundY = getGroundLevelAt(x);

                // 草地
                ctx.fillStyle = '#6ba353';
                ctx.fillRect(x, 0, step, groundY);

                // 地面の濃淡
                ctx.fillStyle = (Math.floor((x - terrainScroll) / 32) % 2 === 0) ? '#5a9345' : '#6ba353';
                ctx.fillRect(x, groundY - stripeH, step, stripeH);

                // 土
                ctx.fillStyle = '#8b7355';
                ctx.fillRect(x, groundY, step, canvas.height - groundY);
            }

            // 土テクスチャ（決定的パターンでちらつき防止）
            if (frameCount % PERF.textureFrameSkip === 0) {
                const texStep = PERF.textureStep;
                const texSize = PERF.textureSize;
                for (let x = 0; x < canvas.width; x += texStep) {
                    const groundY = getGroundLevelAt(x);
                    for (let y = groundY + texSize; y < canvas.height; y += texStep) {
                        const worldCellX = Math.floor((x - terrainScroll) / texStep);
                        const cellY = Math.floor(y / texStep);
                        if ((worldCellX + cellY) % 5 === 0) {
                            ctx.fillStyle = '#7a6449';
                            ctx.fillRect(x, y, texSize, texSize);
                        }
                    }
                }
            }
        }

        function spawnChaserWave(burstCount) {
            for (let j = 0; j < burstCount; j++) {
                if (chasers.length >= PERF.maxChasers) break;
                const startX = canvas.width + 92 + j * 64 + Math.random() * 24;
                const riderHeight = 34;
                const groundY = getGroundLevelAt(startX + 24);
                chasers.push({
                    x: startX,
                    y: groundY - riderHeight,
                    width: 52,
                    height: riderHeight,
                    speed: 1.22 + Math.random() * 0.45 + currentDifficulty.chaserSpeedBonus
                });
            }
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function formatTime(ts) {
            const date = new Date(ts || Date.now());
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
        }

        function bytesToHex(bytes) {
            return Array.from(bytes).map((b) => b.toString(16).padStart(2, '0')).join('');
        }

        function hexToBytes(hex) {
            const result = new Uint8Array(hex.length / 2);
            for (let i = 0; i < result.length; i++) {
                result[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
            }
            return result;
        }

        function renderCreatorLetter() {
            if (!creatorLetterBody) return;
            const text = (chatState.creatorLetter || '').trim();
            creatorLetterBody.textContent = text || '（まだ ありません）';
        }

        function renderChatMessages() {
            const sorted = Array.from(chatState.messages.values())
                .sort((a, b) => (a.ts || 0) - (b.ts || 0))
                .slice(-50);

            if (sorted.length === 0) {
                chatMessages.innerHTML = '<div class="chatMessage">まだ投稿がありません。</div>';
                return;
            }

            chatMessages.innerHTML = sorted.map(msg => {
                const safeName = escapeHtml(msg.name || '名無しメロス');
                const safeText = escapeHtml(msg.text || '');
                const time = formatTime(msg.ts);
                const canDeleteSelf = !!msg.key && !!chatState.pubkey && msg.authorPubkey === chatState.pubkey;
                const actions = canDeleteSelf
                    ? `<span class="chatActions"><button class="chatActionBtn" data-action="delete" data-key="${escapeHtml(msg.key)}">削除</button></span>`
                    : '';
                return `<div class="chatMessage"><span class="chatMeta">[${time}] ${safeName}:</span> ${safeText}${actions}</div>`;
            }).join('');
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function hasValidDeleteClaim(messageId, authorPubkey) {
            const claimers = chatState.deleteClaims.get(messageId);
            if (!claimers || !authorPubkey) return false;
            return claimers.has(authorPubkey);
        }

        function ingestChatRecord(data, key) {
            if (!data || !data.text) return;
            if (hasValidDeleteClaim(key, data.authorPubkey || '')) {
                chatState.removedEventIds.add(key);
                return;
            }
            if (chatState.removedEventIds.has(key)) return;
            if (chatState.seenEventIds.has(key)) return;
            chatState.seenEventIds.add(key);
            chatState.messages.set(key, { ...data, key });
            if (chatState.messages.size > chatState.maxMessages) {
                const oldestKey = chatState.messages.keys().next().value;
                chatState.messages.delete(oldestKey);
            }
            renderChatMessages();
        }

        function applyDeletedIds(ids) {
            if (!Array.isArray(ids) || ids.length === 0) return;
            let changed = false;
            ids.forEach((id) => {
                const key = String(id || '').trim();
                if (!key) return;
                if (!chatState.removedEventIds.has(key)) {
                    chatState.removedEventIds.add(key);
                    changed = true;
                }
                if (chatState.messages.delete(key)) {
                    changed = true;
                }
            });
            if (changed) renderChatMessages();
        }

        function isTrustedAdminEvent(event) {
            const pub = event && event.pubkey ? String(event.pubkey) : '';
            if (!pub) return false;
            if (chatState.adminPubkey) return chatState.adminPubkey === pub;
            chatState.adminPubkey = pub;
            localStorage.setItem(ADMIN_PUBKEY_STORAGE_KEY, pub);
            return true;
        }

        function ingestModerationEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            if (!payload || !Array.isArray(payload.deletedIds)) return;
            applyDeletedIds(payload.deletedIds);
        }

        function ingestCreatorLetterEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            if (!payload || typeof payload.text !== 'string') return;
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < chatState.creatorLetterTs) return;
            chatState.creatorLetter = String(payload.text || '').slice(0, 220);
            chatState.creatorLetterTs = eventTs;
            renderCreatorLetter();
        }

        function ingestDeletionEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            const ids = [];
            (event.tags || []).forEach((tag) => {
                if (Array.isArray(tag) && tag[0] === 'e' && tag[1]) {
                    const targetId = tag[1];
                    const claimers = chatState.deleteClaims.get(targetId) || new Set();
                    claimers.add(event.pubkey || '');
                    chatState.deleteClaims.set(targetId, claimers);
                    const target = chatState.messages.get(targetId);
                    if (target && target.authorPubkey === event.pubkey) {
                        ids.push(targetId);
                    }
                }
            });
            applyDeletedIds(ids);
        }

        function ingestNostrEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            if (event.kind === 5) {
                ingestDeletionEvent(event);
                return;
            }
            if (event.kind === 30078) {
                const dTag = (event.tags || []).find((tag) => Array.isArray(tag) && tag[0] === 'd');
                const dValue = dTag && dTag[1] ? dTag[1] : '';
                if (dValue === NOSTR_MOD_D) {
                    ingestModerationEvent(event);
                    return;
                }
                if (dValue === NOSTR_LETTER_D) {
                    ingestCreatorLetterEvent(event);
                }
                return;
            }
            if (event.kind !== 1) return;
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < BOARD_RESET_TS) return;
            let payload;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                return;
            }
            if (!payload || typeof payload.text !== 'string') return;
            ingestChatRecord({
                name: String(payload.name || '名無しメロス').slice(0, 12),
                text: String(payload.text || '').slice(0, 80),
                uid: payload.uid || '',
                authorPubkey: event.pubkey || '',
                ts: eventTs
            }, event.id);
        }

        async function refreshChatMessages() {
            if (!chatState.pool) return;
            try {
                const events = await chatState.pool.list(NOSTR_RELAYS, [{
                    kinds: [1, 5],
                    '#t': [NOSTR_ROOM_TAG],
                    limit: 220
                }]);
                events.forEach(ingestNostrEvent);

                // #d filter is not uniformly supported by all relays.
                let metaEvents = [];
                try {
                    metaEvents = await chatState.pool.list(NOSTR_RELAYS, [{
                        kinds: [30078],
                        '#d': [NOSTR_MOD_D, NOSTR_LETTER_D],
                        limit: 120
                    }]);
                } catch {
                    metaEvents = await chatState.pool.list(NOSTR_RELAYS, [{
                        kinds: [30078],
                        limit: 160
                    }]);
                }
                metaEvents.forEach(ingestNostrEvent);
            } catch (error) {
                console.warn('Chat refresh failed:', error);
            }
        }

        function initRealtimeChat() {
            if (chatState.initialized) return;
            chatState.initialized = true;

            const savedName = localStorage.getItem('melos_chat_name');
            if (savedName) chatNameInput.value = savedName;
            let savedId = localStorage.getItem('melos_chat_uid');
            if (!savedId) {
                savedId = `uid_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
                localStorage.setItem('melos_chat_uid', savedId);
            }
            chatState.selfId = savedId;

            if (typeof NostrTools === 'undefined') {
                chatStatus.textContent = '掲示板接続に失敗しました（オフライン）';
                return;
            }

            try {
                chatState.adminPubkey = localStorage.getItem(ADMIN_PUBKEY_STORAGE_KEY) || '';
                let keyHex = localStorage.getItem('melos_nostr_secret');
                if (!keyHex) {
                    keyHex = bytesToHex(NostrTools.generateSecretKey());
                    localStorage.setItem('melos_nostr_secret', keyHex);
                }
                chatState.seckey = hexToBytes(keyHex);
                chatState.pubkey = NostrTools.getPublicKey(chatState.seckey);
                chatState.pool = new NostrTools.SimplePool();
                chatState.pool.subscribeMany(
                    NOSTR_RELAYS,
                    [
                        { kinds: [1, 5], '#t': [NOSTR_ROOM_TAG], limit: 220 },
                        { kinds: [30078], limit: 120 }
                    ],
                    {
                        onevent(event) {
                            ingestNostrEvent(event);
                        }
                    }
                );
                refreshChatMessages();
                if (chatState.pollingTimer) {
                    clearInterval(chatState.pollingTimer);
                }
                chatState.pollingTimer = setInterval(refreshChatMessages, 5000);
                chatStatus.textContent = '掲示板オンライン: リアルタイム同期中（端末間）';
            } catch (error) {
                console.warn('Chat initialization failed:', error);
                chatStatus.textContent = '掲示板接続に失敗しました';
            }
        }

        function sendChatMessage() {
            const name = (chatNameInput.value || '名無しメロス').trim().slice(0, 12);
            const text = (chatInput.value || '').trim().slice(0, 80);
            if (!text) return;

            localStorage.setItem('melos_chat_name', name);
            if (!chatState.pool || !chatState.seckey) {
                chatStatus.textContent = '掲示板未接続のため送信できません';
                return;
            }

            const eventTemplate = {
                kind: 1,
                created_at: Math.floor(Date.now() / 1000),
                tags: [['t', NOSTR_ROOM_TAG]],
                content: JSON.stringify({
                    name: name || '名無しメロス',
                    text: text,
                    uid: chatState.selfId
                })
            };
            const signed = NostrTools.finalizeEvent(eventTemplate, chatState.seckey);

            ingestChatRecord({
                name: name || '名無しメロス',
                text: text,
                ts: Date.now(),
                uid: chatState.selfId,
                authorPubkey: chatState.pubkey
            }, signed.id);
            chatState.pool.publish(NOSTR_RELAYS, signed);
            chatInput.value = '';
            chatState.lastEnterAt = 0;
        }

        function deleteOwnMessage(messageId) {
            if (!messageId || !chatState.pool || !chatState.seckey) return;
            const target = chatState.messages.get(messageId);
            if (!target || target.authorPubkey !== chatState.pubkey) return;

            const deleteTemplate = {
                kind: 5,
                created_at: Math.floor(Date.now() / 1000),
                tags: [
                    ['t', NOSTR_ROOM_TAG],
                    ['e', messageId]
                ],
                content: ''
            };
            const signed = NostrTools.finalizeEvent(deleteTemplate, chatState.seckey);
            chatState.pool.publish(NOSTR_RELAYS, signed);
            applyDeletedIds([messageId]);
            chatStatus.textContent = 'コメントを削除しました';
        }
