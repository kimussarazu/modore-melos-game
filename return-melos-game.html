        }

        function update() {
            frameCount++;
            terrainScroll += gameSpeed;
            // ゴール判定（家との接触）と同じ基準で距離を算出
            const totalTravelPixels = (player.x - home.width) - HOME_START_X;
            const traveledPixels = Math.max(0, home.x - HOME_START_X);
            const progressRatio = Math.min(traveledPixels / totalTravelPixels, 1);
            distance = Math.min(GOAL_DISTANCE_METERS, Math.round(progressRatio * GOAL_DISTANCE_METERS));
            score = distance;
            const remaining = Math.max(0, GOAL_DISTANCE_METERS - distance);
            scoreDisplay.textContent = `残り: ${remaining}m [${currentDifficulty.label}]`;

            // Increase difficulty
            if (frameCount % currentDifficulty.speedRampInterval === 0 && gameSpeed < currentDifficulty.maxSpeed) {
                gameSpeed += Math.max(0.12, Number(currentDifficulty.speedRampStep || 0.22));
            }

            // 入力感度を上げる（コヨーテタイム + 入力バッファ）
            if (player.grounded) {
                player.coyoteFrames = player.maxCoyoteFrames;
            } else {
                player.coyoteFrames = Math.max(0, player.coyoteFrames - 1);
            }
            if (player.jumpBufferFrames > 0) {
                player.jumpBufferFrames--;
                jump();
            }

            // Player movement（長押しで滞空時間がより伸びる）
            const canFloat = jumpHeld && player.velocityY < 0 && player.jumpHoldFrames < player.maxJumpHoldFrames;
            if (canFloat) {
                // 押し始めは強く浮き、後半は徐々に通常重力へ戻す
                const holdRatio = player.jumpHoldFrames / player.maxJumpHoldFrames;
                const holdGravityFactor = 0.24 + holdRatio * 0.44;
                player.velocityY += player.gravity * holdGravityFactor;
                player.jumpHoldFrames++;
            } else {
                // 早く離すと上昇が早めに終わり、短いジャンプになる
                if (!jumpHeld && player.velocityY < 0 && player.jumpHoldFrames < player.maxJumpHoldFrames) {
                    player.velocityY += player.gravity * 0.68;
                }
                player.velocityY += player.gravity;
            }
            player.velocityY = Math.max(-13, Math.min(10, player.velocityY));
            player.y += player.velocityY;

            // Ground collision
            const groundLevel = getGroundLevelAt(player.x + player.width * 0.5);
            if (player.y + player.height > groundLevel) {
                player.y = groundLevel - player.height;
                player.velocityY = 0;
                player.grounded = true;
                player.jumpsUsed = 0;
                player.jumpHoldFrames = 0;
                if (player.jumpBufferFrames > 0) {
                    jump();
                }
            } else if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            } else {
                player.grounded = false;
            }

            // Update home position (moves RIGHT as player moves LEFT)
            home.x += gameSpeed;

            // Check if reached home
            if (home.x + home.width >= player.x && home.x <= player.x + player.width) {
                if (dinoState.active) {
                    deathCause = '恐竜に乗ったまま帰宅してしまった';
                    gameOver();
                    return;
                }
                winGame();
                return;
            }

            if (dinoState.active) {
                dinoState.timer = Math.max(0, dinoState.timer - 1);
                if (selectedDifficulty === 'europeanExtreme' && dinoTankState.pendingStrikeFrames > 0) {
                    dinoTankState.pendingStrikeFrames--;
                    if (dinoTankState.pendingStrikeFrames <= 0) {
                        triggerExtremeTankStrike();
                    }
                }
                if (!dinoState.active) {
                    // 戦車演出で恐竜解除されたフレームは恐竜物理をスキップ
                    updateDinoButtonUi();
                } else {
                dinoState.vy += 0.58;
                dinoState.vy = Math.min(10.5, dinoState.vy);
                dinoState.yOffset += dinoState.vy;
                const dinoBox = getDinoHitbox();
                const groundY = getGroundLevelAt(player.x + player.width * 0.5);
                const dinoGroundY = groundY - dinoState.height;
                if (dinoBox.y >= dinoGroundY) {
                    dinoState.yOffset = 0;
                    dinoState.vy = 0;
                    dinoState.grounded = true;
                } else {
                    dinoState.grounded = false;
                }
                const fixedDinoBox = getDinoHitbox();
                player.y = fixedDinoBox.y - player.height + 6;
                player.velocityY = 0;
                player.grounded = true;
                player.jumpsUsed = 0;
                player.jumpHoldFrames = 0;
                player.jumpBufferFrames = 0;
                if (dinoState.grounded && frameCount % 2 === 0) {
                    spawnDinoDust();
                }
                dinoState.fireCooldown = Math.max(0, dinoState.fireCooldown - 1);
                if (dinoState.fireCooldown <= 0) {
                    spawnDinoFire();
                    dinoState.fireCooldown = DINO_FIRE_INTERVAL;
                }
                if (dinoState.timer <= 0) {
                    deactivateDinoMode(true);
                }
                updateDinoButtonUi();
                }
            }
            if (dinoState.recoveryInvulFrames > 0) {
                dinoState.recoveryInvulFrames--;
            }
            if (dinoState.thanksTimer > 0) {
                dinoState.thanksTimer--;
            }
            if (dinoTankState.active) {
                dinoTankState.flashFrames = Math.max(0, dinoTankState.flashFrames - 1);
                if (dinoTankState.phase === 'enter') {
                    // 戦車は自走させず、カメラ（地形スクロール）で自然に映り込ませる
                    dinoTankState.x += gameSpeed;
                    if (dinoTankState.x >= dinoTankState.targetX) {
                        dinoTankState.x = dinoTankState.targetX;
                        dinoTankState.phase = 'kickWindup';
                        dinoTankState.kickWindupFrames = GIANT_DINO_KICK_WINDUP_FRAMES;
                    }
                } else if (dinoTankState.phase === 'kickWindup') {
                    dinoTankState.kickWindupFrames--;
                    if (dinoTankState.kickWindupFrames <= 0) {
                        fireExtremeTankCannon();
                        dinoTankState.phase = 'hold';
                    }
                } else if (dinoTankState.phase === 'hold') {
                    dinoTankState.holdFrames--;
                    if (dinoTankState.holdFrames <= 0) {
                        dinoTankState.phase = 'retreat';
                    }
                } else if (dinoTankState.phase === 'retreat') {
                    dinoTankState.x -= DINO_TANK_EXIT_SPEED;
                    if (frameCount % 2 === 0) {
                        spawnGiantDinoRetreatDust();
                    }
                    if (dinoTankState.x + (GIANT_DINO_BASE_WIDTH * GIANT_DINO_SCALE) < -30) {
                        dinoTankState.active = false;
                        dinoTankState.phase = 'idle';
                    }
                }
            }
            if (dinoLaunchFx.active) {
                dinoLaunchFx.x += dinoLaunchFx.vx;
                dinoLaunchFx.y += dinoLaunchFx.vy;
                dinoLaunchFx.vy += 0.18;
                dinoLaunchFx.rot += 0.36;
                dinoLaunchFx.life--;
                if (
                    dinoLaunchFx.x > canvas.width + 260 ||
                    dinoLaunchFx.y < -260 ||
                    dinoLaunchFx.life <= 0
                ) {
                    dinoLaunchFx.active = false;
                }
            }
            for (let i = dinoKickShocks.length - 1; i >= 0; i--) {
                const shock = dinoKickShocks[i];
                shock.r += 4.2;
                shock.life--;
                if (shock.life <= 0) dinoKickShocks.splice(i, 1);
            }

            // 終盤に王様をラスボスとして1体だけ出現
            const remainingMeters = Math.max(0, GOAL_DISTANCE_METERS - distance);
            if (!kingSpawned && remainingMeters <= 380) {
                const kingGround = getGroundLevelAt(-70 + KING_BOSS.width * 0.5);
                obstacles.push({
                    x: -70,
                    y: kingGround - KING_BOSS.height,
                    width: KING_BOSS.width,
                    height: KING_BOSS.height,
                    type: KING_BOSS,
                    flying: false,
                    followsGround: true,
                    elevatedType: null,
                    towerHeight: 0,
                    boss: true
                });
                kingSpawned = true;
            }

            if (chaserSafetyTimer > 0) {
                chaserSafetyTimer--;
            }
            // 騎馬の警告〜直後のみ生成を抑え、騎馬が走行中でも通常敵は復帰させる
            const isChaserSafetyWindow = !!pendingChaserWave || chaserWarningTimer > 0 || chaserSafetyTimer > 0;

            // Create obstacles (more frequently for longer game)
            const kingActive = obstacles.some(ob => ob.boss);
            if (!kingActive && !isChaserSafetyWindow && frameCount % currentDifficulty.obstacleSpawnInterval === 0) {
                let type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                if (ARCHER_TYPE && NON_ARCHER_TYPES.length > 0) {
                    const archerWeight = Math.max(0, Math.min(0.95, Number(currentDifficulty.archerWeight || 0)));
                    if (Math.random() < archerWeight) {
                        type = ARCHER_TYPE;
                    } else {
                        type = NON_ARCHER_TYPES[Math.floor(Math.random() * NON_ARCHER_TYPES.length)];
                    }
                }
                // 奥にいる敵（櫓/気球）は弓兵のみ
                const canBeElevated = type.name === 'archer';
                const flyingChance = Math.max(0, Math.min(1, Number(currentDifficulty.flyingArcherChance || 0.38)));
                const isFlying = canBeElevated && Math.random() < flyingChance;
                const spawnGroundY = getGroundLevelAt(-50 + type.width * 0.5);
                let spawnY = isFlying ? 150 + Math.random() * 150 : spawnGroundY - type.height;
                let elevatedType = null;
                let structureHeight = 0;
                if (isFlying) {
                    elevatedType = Math.random() > 0.45 ? 'balloon' : 'rooftop';
                    if (elevatedType === 'balloon') {
                        spawnY = 130 + Math.random() * 120;
                    } else {
                        structureHeight = 52 + Math.floor(Math.random() * 18);
                        spawnY = spawnGroundY - type.height - structureHeight;
                    }
                }
                if (type.name === 'archer') {
                    if (!isFlying) spawnY = spawnGroundY - type.height;
                }
                obstacles.push({
                    x: -50,
                    y: spawnY,
                    width: type.width,
                    height: type.height,
                    type: type,
                    flying: isFlying,
                    followsGround: !isFlying || elevatedType === 'rooftop',
                    elevatedType: elevatedType,
                    structureHeight: structureHeight
                });
            }

            // 難易度別の騎馬プランに従ってランダムタイミング出現
            if (!pendingChaserWave && chasers.length === 0 && chaserPlanIndex < chaserPlan.length) {
                const nextWave = chaserPlan[chaserPlanIndex];
                if (distance >= Math.max(0, nextWave.meter - 28)) {
                    const warningLead = Math.max(26, Math.floor(Number(currentDifficulty.chaserWarningLead || CHASER_WARNING_LEAD)));
                    pendingChaserWave = {
                        timer: warningLead,
                        burst: nextWave.burst
                    };
                    chaserWarningTimer = warningLead;
                }
            }
            if (pendingChaserWave) {
                pendingChaserWave.timer--;
                chaserWarningTimer = pendingChaserWave.timer;
                if (pendingChaserWave.timer <= 0) {
                    spawnChaserWave(pendingChaserWave.burst);
                    chaserPlanIndex++;
                    pendingChaserWave = null;
                    chaserWarningTimer = 0;
                    chaserSafetyTimer = Math.max(20, Math.floor(Number(currentDifficulty.chaserSafetyAfterWave || 70)));
                }
            }

            // Update obstacles (move RIGHT)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x += gameSpeed;
                if (obstacles[i].followsGround) {
                    const obstacleGround = getGroundLevelAt(obstacles[i].x + obstacles[i].width * 0.5);
                    const supportHeight = obstacles[i].elevatedType === 'rooftop' ? obstacles[i].structureHeight : 0;
                    obstacles[i].y = obstacleGround - obstacles[i].height - supportHeight;
                }

                // Remove off-screen obstacles
                if (obstacles[i].x > canvas.width) {
                    obstacles.splice(i, 1);
                    continue;
                }

                // 奥レイヤー（櫓/気球）は接触しない。地上の敵のみ接触判定
                const obstacleHitbox = getObstacleHitbox(obstacles[i]);
                if (dinoState.active) {
                    const dinoBox = getDinoHitbox();
                    const targetBox = obstacleHitbox || {
                        x: obstacles[i].x,
                        y: obstacles[i].y,
                        width: obstacles[i].width,
                        height: obstacles[i].height
                    };
                    const fireHit = dinoFires.some((fire) => checkCollision({
                        x: fire.x,
                        y: fire.y,
                        width: fire.size,
                        height: fire.size
                    }, targetBox));
                    if (checkCollision(dinoBox, targetBox) || fireHit) {
                        spawnDinoExplosion(
                            targetBox.x + targetBox.width * 0.5,
                            targetBox.y + targetBox.height * 0.5,
                            obstacles[i].boss ? 1.5 : 1
                        );
                        obstacles.splice(i, 1);
                        continue;
                    }
                }
                if (!isPlayerInvulnerable() && obstacleHitbox && checkCollision(getPlayerHitbox(player), obstacleHitbox)) {
                    setDeathCauseByObstacle(obstacles[i]);
                    gameOver();
                    return;
                }

                // 弓兵は一定間隔で矢を発射
                if (!isChaserSafetyWindow && obstacles[i].type.name === 'archer' && frameCount % currentDifficulty.archerFireInterval === 0) {
                    if (projectiles.length >= getProjectileLimit()) continue;
                    const isBackgroundArcher = !!obstacles[i].elevatedType;
                    const spawnX = obstacles[i].x + obstacles[i].width;
                    const spawnY = isBackgroundArcher
                        ? (obstacles[i].elevatedType === 'balloon' ? obstacles[i].y - 2 : obstacles[i].y + 10)
                        : obstacles[i].y + 17;
                    const volleyChance = Math.max(0, Math.min(0.9, Number(currentDifficulty.archerVolleyChance || 0)));
                    const volleySpread = Math.max(8, Number(currentDifficulty.archerVolleySpread || 20));
                    let shotCount = 1;
                    if (isBackgroundArcher && Math.random() < volleyChance) {
                        shotCount = 2;
                        if (Math.random() < volleyChance * 0.35) shotCount = 3;
                    }

                    for (let s = 0; s < shotCount; s++) {
                        if (projectiles.length >= getProjectileLimit()) break;
                        if (isBackgroundArcher) {
                            // 発射時のみ未来位置を狙う（追尾はしない）
                            const centerOffset = s - (shotCount - 1) * 0.5;
                            const targetX = player.x + player.width * 0.8 + gameSpeed * (20 + centerOffset * 1.8);
                            const targetY = player.y + player.height * 0.58 + centerOffset * volleySpread * 0.55;
                            const dx = targetX - spawnX;
                            const dy = targetY - spawnY;
                            const length = Math.hypot(dx, dy) || 1;
                            const shotSpeed = gameSpeed + currentDifficulty.projectileSpeedBonus + 0.8;
                            projectiles.push({
                                x: spawnX,
                                y: spawnY,
                                width: 18,
                                height: 6,
                                vx: (dx / length) * shotSpeed,
                                vy: (dy / length) * shotSpeed,
                                fromBackground: true,
                                variant: 'arrow'
                            });
                        } else {
                            projectiles.push({
                                x: spawnX,
                                y: spawnY,
                                width: 24,
                                height: 8,
                                speed: gameSpeed + currentDifficulty.projectileSpeedBonus,
                                variant: 'arrow'
                            });
                        }
                    }
                }

                // 王様ラスボスは強化弾を連射
                if (obstacles[i].boss && frameCount % 56 === 0) {
                    if (projectiles.length >= getProjectileLimit()) continue;
                    const baseX = obstacles[i].x + obstacles[i].width;
                    const baseY = obstacles[i].y + 20;
                    for (let s = -1; s <= 1; s++) {
                        if (projectiles.length >= getProjectileLimit()) break;
                        projectiles.push({
                            x: baseX,
                            y: baseY + s * 10,
                            width: 28,
                            height: 10,
                            speed: gameSpeed + currentDifficulty.projectileSpeedBonus + 1.8,
                            variant: 'royal'
                        });
                    }
                }
            }

            // Update projectiles (move RIGHT)
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (typeof projectiles[i].vx === 'number') {
                    projectiles[i].x += projectiles[i].vx;
                    projectiles[i].y += projectiles[i].vy;
                } else {
                    projectiles[i].x += projectiles[i].speed;
                }

                if (
                    projectiles[i].x > canvas.width + 30 ||
                    projectiles[i].y < -40 ||
                    projectiles[i].y > canvas.height + 40
                ) {
                    projectiles.splice(i, 1);
                    continue;
                }

                const projectileHitbox = getProjectileHitbox(projectiles[i]);
                if (dinoState.active) {
                    const dinoBox = getDinoHitbox();
                    const fireHit = dinoFires.some((fire) => checkCollision({
                        x: fire.x,
                        y: fire.y,
                        width: fire.size,
                        height: fire.size
                    }, projectileHitbox));
                    if (checkCollision(dinoBox, projectileHitbox) || fireHit) {
                        spawnDinoExplosion(projectileHitbox.x + projectileHitbox.width * 0.5, projectileHitbox.y + projectileHitbox.height * 0.5, 0.8);
                        projectiles.splice(i, 1);
                        continue;
                    }
                }
                if (!isPlayerInvulnerable() && checkCollision(getPlayerHitbox(player), projectileHitbox)) {
                    deathCause = projectiles[i].variant === 'royal' ? '王の強化弾に撃たれた' : '矢に撃ち抜かれた';
                    gameOver();
                    return;
                }
            }

            // 騎馬追手（画面右から左へ）
            for (let i = chasers.length - 1; i >= 0; i--) {
                chasers[i].x -= chasers[i].speed;
                const chaseGround = getGroundLevelAt(chasers[i].x + chasers[i].width * 0.45);
                chasers[i].y = chaseGround - chasers[i].height;

                if (chasers[i].x + chasers[i].width < -40) {
                    chasers.splice(i, 1);
                    continue;
                }
                // 見た目より少し小さい当たり判定で、ギリ回避しやすくする
                const chaserHitbox = {
                    x: chasers[i].x + 10,
                    y: chasers[i].y + 10,
                    width: 30,
                    height: 20
                };
                if (dinoState.active) {
                    const dinoBox = getDinoHitbox();
                    const fireHit = dinoFires.some((fire) => checkCollision({
                        x: fire.x,
                        y: fire.y,
                        width: fire.size,
                        height: fire.size
                    }, chaserHitbox));
                    if (checkCollision(dinoBox, chaserHitbox) || fireHit) {
                        spawnDinoExplosion(chaserHitbox.x + chaserHitbox.width * 0.5, chaserHitbox.y + chaserHitbox.height * 0.5, 1.2);
                        chasers.splice(i, 1);
                        continue;
                    }
                }
                if (!isPlayerInvulnerable() && checkCollision(getPlayerHitbox(player), chaserHitbox)) {
                    deathCause = '騎馬追手に轢かれた';
                    gameOver();
                    return;
                }
            }

            // Update clouds (move RIGHT)
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width) {
                    cloud.x = -cloud.width;
                    cloud.y = Math.random() * 150 + 20;
                }
            });

            for (let i = dinoFires.length - 1; i >= 0; i--) {
                const f = dinoFires[i];
                f.x += f.vx;
                f.y += f.vy;
                f.life--;
                if (f.life <= 0 || f.x + f.size < -30 || f.y < -30 || f.y > canvas.height + 30) {
                    dinoFires.splice(i, 1);
                }
            }
            for (let i = dinoDusts.length - 1; i >= 0; i--) {
                const p = dinoDusts[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04;
                p.life--;
                if (p.life <= 0) dinoDusts.splice(i, 1);
            }
            for (let i = dinoExplosions.length - 1; i >= 0; i--) {
                const p = dinoExplosions[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.06;
                p.life--;
                if (p.life <= 0) dinoExplosions.splice(i, 1);
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function getPlayerHitbox(p) {
            // 見た目の胴体中心で判定し、足先や余白の誤判定を減らす
            return {
                x: p.x + 9,
                y: p.y + 6,
                width: 14,
                height: 30
            };
        }

        function getProjectileHitbox(projectile) {
            const x = projectile.x;
            const y = projectile.y;
            if (projectile.variant === 'royal') {
                return { x: x + 2, y: y + 2, width: 22, height: 6 };
            }
            if (projectile.fromBackground) {
                return { x: x + 2, y: y + 2, width: 12, height: 3 };
            }
            return { x: x + 2, y: y + 2, width: 18, height: 4 };
        }

        function getObstacleHitbox(obstacle) {
            // 奥にある櫓・気球は演出専用（接触しない）
            if (obstacle.elevatedType) return null;

            // 木は見た目より当たり判定を細く（幹中心）
            if (obstacle.type.name === 'tree') {
                return {
                    x: obstacle.x + 11,
                    y: obstacle.y + 22,
                    width: 14,
                    height: 34
                };
            }

            if (obstacle.type.name === 'rock') {
                return {
                    x: obstacle.x + 6,
                    y: obstacle.y + 8,
                    width: Math.max(18, obstacle.width - 12),
                    height: Math.max(14, obstacle.height - 10)
                };
            }

            if (obstacle.type.name === 'soldier' || obstacle.type.name === 'villager' || obstacle.type.name === 'archer') {
                return {
                    x: obstacle.x + 5,
                    y: obstacle.y + 6,
                    width: Math.max(14, obstacle.width - 10),
                    height: Math.max(24, obstacle.height - 10)
                };
            }

            if (obstacle.type.name === 'king') {
                return {
                    x: obstacle.x + 8,
                    y: obstacle.y + 8,
                    width: Math.max(24, obstacle.width - 16),
                    height: Math.max(34, obstacle.height - 14)
                };
            }

            return {
                x: obstacle.x + 4,
                y: obstacle.y + 4,
                width: Math.max(12, obstacle.width - 8),
                height: Math.max(12, obstacle.height - 8)
            };
        }

        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#5b9bd5');
            gradient.addColorStop(0.4, '#8fbbe5');
            gradient.addColorStop(0.7, '#c7e0f4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw pixel clouds
            clouds.forEach(cloud => {
                drawPixelCloud(cloud.x, cloud.y, cloud.width);
            });

            // 起伏地形
            drawTerrain();

            // Draw home if visible
            if (home.x > -home.width && home.x < canvas.width) {
                const homeGroundY = getGroundLevelAt(home.x + home.width * 0.5);
                drawHome(home.x, homeGroundY - home.height);
            }

            // 奥の敵（櫓/気球）を先に描画
            obstacles.forEach(obstacle => {
                if (obstacle.elevatedType) drawObstacle(obstacle);
            });

            if (dinoState.active) {
                drawDinoRide();
            } else {
                // 無敵復帰中はスター風に光って点滅
                if (dinoState.recoveryInvulFrames > 0) {
                    const blinkOn = Math.floor(frameCount / 4) % 2 === 0;
                    const pulse = 0.55 + (Math.sin(frameCount * 0.42) + 1) * 0.2;
                    ctx.save();
                    if (blinkOn) {
                        ctx.globalAlpha = Math.min(1, 0.62 + pulse * 0.35);
                        ctx.shadowColor = 'rgba(255, 242, 125, 0.95)';
                        ctx.shadowBlur = 10 + pulse * 12;
                    } else {
                        ctx.globalAlpha = 0.24;
                    }
                    drawMelos(player.x, player.y);
                    ctx.restore();
                } else {
                    // Draw player (Red Melos) - pixel art style
                    drawMelos(player.x, player.y);
                }
            }

            // 手前の敵を後で描画
            obstacles.forEach(obstacle => {
                if (!obstacle.elevatedType) drawObstacle(obstacle);
            });

            // Draw horse chasers
            chasers.forEach(chaser => {
                drawHorseChaser(chaser);
            });
            if (dinoTankState.active) {
                drawDinoTankAmbush();
            }
            drawDinoLaunchFx();

            // 騎馬追手の接近予告（終盤ほど速く点滅）
            if (chaserWarningTimer > 0) {
                const blinkSpan = chaserWarningTimer > 28 ? 5 : 2;
                if (Math.floor(chaserWarningTimer / blinkSpan) % 2 === 0) {
                    const warningX = canvas.width - 108;
                    const warningY = 180;
                    const urgent = chaserWarningTimer < 22;

                    // 外枠
                    ctx.fillStyle = urgent ? '#5a0d0d' : '#2a1a12';
                    ctx.fillRect(warningX, warningY, 70, 52);
                    // 内側
                    ctx.fillStyle = urgent ? '#ffb347' : '#ffe173';
                    ctx.fillRect(warningX + 4, warningY + 4, 62, 44);

                    // 左向きのミニ馬シルエット（本体の進行方向に合わせる）
                    ctx.fillStyle = '#4a2b19';
                    ctx.fillRect(warningX + 24, warningY + 28, 20, 8);
                    ctx.fillRect(warningX + 16, warningY + 25, 8, 6);
                    ctx.fillRect(warningX + 27, warningY + 36, 3, 6);
                    ctx.fillRect(warningX + 35, warningY + 36, 3, 6);
                    ctx.fillRect(warningX + 17, warningY + 36, 3, 6);

                    // 強調マーク
                    ctx.fillStyle = '#8b0000';
                    ctx.font = urgent
                        ? '26px "PixelMplus12", "Press Start 2P", monospace'
                        : '22px "PixelMplus12", "Press Start 2P", monospace';
                    ctx.fillText(urgent ? '!!' : '!', warningX + 40, warningY + 38);
                }
            }

            // Draw arrows
            projectiles.forEach(projectile => {
                drawArrow(projectile);
            });

            drawDinoFireEffects();
            drawDinoKickShockEffects();
            drawDinoDustEffects();
            drawDinoExplosionEffects();

            // Progress indicator
            const progress = Math.min(distance / GOAL_DISTANCE_METERS, 1);
            ctx.fillStyle = '#000';
            ctx.fillRect(10, canvas.height - 30, 200, 20);
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(12, canvas.height - 28, 196 * progress, 16);
            ctx.fillStyle = '#ffd700';
            ctx.font = '12px "PixelMplus12", "Press Start 2P", monospace';
            const remainMeters = Math.max(0, GOAL_DISTANCE_METERS - distance);
            ctx.fillText(`${remainMeters}m`, 215, canvas.height - 15);

            if (dinoState.thanksTimer > 0) {
                const thanksAlpha = Math.min(1, dinoState.thanksTimer / 48);
                const text = dinoState.thanksText || 'ありがとう';
                const by = player.y - 24;
                ctx.font = '10px "PixelMplus12", "Press Start 2P", monospace';
                const textW = Math.ceil(ctx.measureText(text).width);
                const bubbleW = textW + 10;
                const bx = player.x - 10;
                ctx.fillStyle = `rgba(255, 255, 255, ${0.94 * thanksAlpha})`;
                ctx.fillRect(bx - 2, by - 12, bubbleW, 18);
                ctx.fillStyle = `rgba(0, 0, 0, ${thanksAlpha})`;
                ctx.fillText(text, bx + 2, by);
            }
        }

        function drawDinoRide() {
            const dino = getDinoHitbox();
            const x = dino.x;
            const y = dino.y;

            const legPhase = Math.floor((frameCount % 24) / 6);
            const legOffsetA = (legPhase === 0 || legPhase === 2) ? 0 : 2;
            const legOffsetB = (legPhase === 1 || legPhase === 3) ? 0 : 2;

            // Left-facing head + jaw
            ctx.fillStyle = '#2f8f3f';
            ctx.fillRect(x + 2, y + 8, 30, 20);
            ctx.fillRect(x - 2, y + 22, 24, 8);
            ctx.fillStyle = '#3fa652';
            ctx.fillRect(x, y + 24, 20, 5);
            ctx.fillStyle = '#101010';
            ctx.fillRect(x + 8, y + 13, 3, 3);

            // Body + ridge
            ctx.fillStyle = '#2f8f3f';
            ctx.fillRect(x + 24, y + 20, 72, 30);
            ctx.fillStyle = '#226f31';
            ctx.fillRect(x + 30, y + 14, 60, 8);

            // Tail (right)
            ctx.fillStyle = '#2f8f3f';
            ctx.fillRect(x + 92, y + 30, 24, 10);
            ctx.fillRect(x + 116, y + 33, 14, 6);

            // Running legs (dino only)
            ctx.fillStyle = '#266f32';
            ctx.fillRect(x + 28, y + 50 + legOffsetA, 10, 14 - legOffsetA);
            ctx.fillRect(x + 46, y + 50 + legOffsetB, 10, 14 - legOffsetB);
            ctx.fillRect(x + 66, y + 50 + legOffsetA, 10, 14 - legOffsetA);
            ctx.fillRect(x + 84, y + 50 + legOffsetB, 10, 14 - legOffsetB);

            // Static rider Melos (legs do not move)
            drawMelosStatic(x + 52, y - 8);

            // Remaining time above rider
            const remainSec = Math.max(0, Math.ceil(dinoState.timer / 60));
            ctx.fillStyle = '#ffe89a';
            ctx.font = '12px "PixelMplus12", "Press Start 2P", monospace';
            ctx.fillText(`恐竜 ${remainSec}s`, x + 34, y - 12);
        }

        function drawMelosStatic(x, y) {
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(x + 8, y + 12, 16, 20);
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(x + 10, y, 12, 12);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 12, y + 4, 3, 3);
            ctx.fillRect(x + 17, y + 4, 3, 3);
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(x + 5, y + 16, 4, 12);
            ctx.fillRect(x + 23, y + 16, 4, 12);
            ctx.fillRect(x + 10, y + 32, 4, 8);
            ctx.fillRect(x + 18, y + 32, 4, 8);
        }

        function drawDinoFireEffects() {
            dinoFires.forEach((fire) => {
                const alpha = Math.max(0.2, fire.life / (DINO_FIRE_LIFE + 16));
                ctx.fillStyle = `rgba(255, 124, 42, ${alpha * 0.55})`;
                ctx.fillRect(fire.x + 6, fire.y + 3, 12, 8);
                ctx.fillStyle = `rgba(255, 218, 112, ${alpha})`;
                ctx.fillRect(fire.x, fire.y, fire.size, fire.size - 2);
                ctx.fillStyle = `rgba(255, 90, 34, ${alpha})`;
                ctx.fillRect(fire.x + 3, fire.y + 2, fire.size - 6, fire.size - 6);
            });
        }

        function drawDinoTankAmbush() {
            const alpha = 1;
            const x = dinoTankState.x;
            const y = dinoTankState.y;
            const s = GIANT_DINO_SCALE;
            ctx.save();
            ctx.globalAlpha = alpha;

            // 名前ラベル（巨大恐竜であることを明示）
            const labelText = '超巨大恐竜';
            ctx.font = '14px "PixelMplus12", "Press Start 2P", monospace';
            const labelW = Math.ceil(ctx.measureText(labelText).width) + 14;
            const labelX = x + Math.max(8, Math.floor((GIANT_DINO_BASE_WIDTH * s - labelW) * 0.5));
            const labelY = y - 30;
            ctx.fillStyle = 'rgba(30, 18, 14, 0.92)';
            ctx.fillRect(labelX, labelY, labelW, 20);
            ctx.fillStyle = '#ffdd8f';
            ctx.fillText(labelText, labelX + 7, labelY + 14);

            ctx.translate(x, y);
            if (dinoTankState.phase === 'retreat') {
                // 弾き飛ばし後は左右反転して左向き退場
                ctx.translate(GIANT_DINO_BASE_WIDTH * s, 0);
                ctx.scale(-1, 1);
            } else {
                ctx.scale(1, 1);
            }
            ctx.scale(s, s);

            // 超巨大恐竜（右向き）: リアル寄りディテール
            ctx.fillStyle = '#5a4639';                // body
            ctx.fillRect(20, 24, 128, 52);
            ctx.fillStyle = '#6f5a4b';                // upper body highlight
            ctx.fillRect(32, 28, 96, 14);
            ctx.fillStyle = '#4a392f';                // belly shadow
            ctx.fillRect(30, 62, 98, 12);

            ctx.fillStyle = '#675142';                // neck + head
            ctx.fillRect(108, 12, 44, 24);
            ctx.fillRect(142, 8, 34, 22);
            ctx.fillRect(166, 14, 14, 12);            // snout tip
            ctx.fillStyle = '#3f3128';                // jaw
            ctx.fillRect(150, 26, 24, 8);

            // teeth
            ctx.fillStyle = '#f2eadc';
            for (let t = 0; t < 4; t++) {
                ctx.fillRect(154 + t * 4, 31, 2, 3);
            }

            // nostril + eye + brow
            ctx.fillStyle = '#201814';
            ctx.fillRect(170, 17, 3, 2); // nostril
            ctx.fillRect(146, 14, 4, 4); // eye
            ctx.fillStyle = '#8b7360';
            ctx.fillRect(142, 10, 10, 2); // brow

            // dorsal plates/spines
            ctx.fillStyle = '#7f6958';
            for (let i = 0; i < 7; i++) {
                ctx.fillRect(34 + i * 14, 18 - (i % 2), 6, 7);
            }

            // tail
            ctx.fillStyle = '#4b3a30';
            ctx.fillRect(8, 34, 18, 12);
            ctx.fillRect(-10, 38, 20, 9);

            // legs + claws
            ctx.fillStyle = '#47372d';
            ctx.fillRect(38, 76, 14, 14);
            ctx.fillRect(70, 76, 14, 14);
            ctx.fillRect(102, 76, 14, 14);
            ctx.fillRect(128, 76, 14, 14);
            ctx.fillStyle = '#d7c9b4';
            ctx.fillRect(40, 89, 3, 2);
            ctx.fillRect(44, 89, 3, 2);
            ctx.fillRect(72, 89, 3, 2);
            ctx.fillRect(76, 89, 3, 2);
            ctx.fillRect(104, 89, 3, 2);
            ctx.fillRect(108, 89, 3, 2);
            ctx.fillRect(130, 89, 3, 2);
            ctx.fillRect(134, 89, 3, 2);

            // 前脚キック演出（命中フレームで右前脚を大きく突き出す）
            const kickActive = dinoTankState.flashFrames > 0;
            const kickWindup = dinoTankState.phase === 'kickWindup';
            ctx.fillStyle = '#47372d';
            if (kickActive) {
                ctx.fillRect(126, 70, 22, 10); // 太もも
                ctx.fillRect(146, 68, 26, 12); // すね
                ctx.fillRect(168, 66, 12, 8);  // 足先
            } else if (kickWindup) {
                // 予備動作で一度ひいてから蹴る
                ctx.fillRect(112, 78, 18, 10);
                ctx.fillRect(98, 80, 16, 10);
            } else {
                ctx.fillRect(126, 76, 14, 14); // 通常前脚
            }

            // キックインパクト
            if (dinoTankState.flashFrames > 0) {
                const flashAlpha = alpha * Math.min(1, dinoTankState.flashFrames / DINO_TANK_FLASH_FRAMES);
                ctx.strokeStyle = `rgba(255, 244, 150, ${flashAlpha})`;
                ctx.lineWidth = 1;
                ctx.beginPath();
                const ix = (dinoTankState.hitX - x) / s;
                const iy = (dinoTankState.hitY - y) / s;
                ctx.moveTo(ix - 18, iy - 10);
                ctx.lineTo(ix + 18, iy + 10);
                ctx.moveTo(ix - 16, iy + 12);
                ctx.lineTo(ix + 16, iy - 12);
                ctx.stroke();
                ctx.fillStyle = `rgba(255, 171, 78, ${flashAlpha})`;
                ctx.fillRect(ix - 6, iy - 6, 12, 12);
            }

            ctx.restore();
        }

        function spawnGiantDinoRetreatDust() {
            const baseX = dinoTankState.x + GIANT_DINO_BASE_WIDTH * GIANT_DINO_SCALE * 0.35;
            const baseY = dinoTankState.y + GIANT_DINO_BASE_HEIGHT * GIANT_DINO_SCALE;
            for (let i = 0; i < 8; i++) {
                dinoDusts.push({
                    x: baseX + Math.random() * 190,
                    y: baseY - 6 + Math.random() * 16,
                    vx: 1.8 + Math.random() * 2.4,
                    vy: -1.4 - Math.random() * 2.2,
                    life: 28 + Math.floor(Math.random() * 20),
                    size: 7 + Math.floor(Math.random() * 8)
                });
            }
        }

        function drawDinoLaunchFx() {
            if (!dinoLaunchFx.active) return;
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.translate(dinoLaunchFx.x + 28, dinoLaunchFx.y + 18);
            ctx.rotate(dinoLaunchFx.rot);
            ctx.fillStyle = '#2f8f3f';
            ctx.fillRect(-24, -12, 48, 24);
            ctx.fillRect(-30, -10, 14, 14);
            ctx.fillRect(20, -8, 12, 10);
            ctx.fillStyle = '#226f31';
            ctx.fillRect(-10, 12, 8, 10);
            ctx.fillRect(8, 12, 8, 10);
            ctx.restore();
        }

        function drawDinoKickShockEffects() {
            dinoKickShocks.forEach((shock) => {
                const a = Math.max(0, shock.life / 20);
                ctx.save();
                ctx.strokeStyle = `rgba(255, 242, 166, ${a})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(shock.x, shock.y, shock.r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.strokeStyle = `rgba(255, 170, 84, ${a * 0.9})`;
                ctx.lineWidth = 2;
                for (let i = 0; i < 8; i++) {
                    const angle = (Math.PI * 2 * i) / 8;
                    const x1 = shock.x + Math.cos(angle) * (shock.r - 8);
                    const y1 = shock.y + Math.sin(angle) * (shock.r - 8);
                    const x2 = shock.x + Math.cos(angle) * (shock.r + 8);
                    const y2 = shock.y + Math.sin(angle) * (shock.r + 8);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        function drawDinoDustEffects() {
            dinoDusts.forEach((p) => {
                const alpha = Math.max(0.15, p.life / 20);
                ctx.fillStyle = `rgba(206, 176, 116, ${alpha})`;
                ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
            });
        }

        function drawDinoExplosionEffects() {
            dinoExplosions.forEach((p) => {
                const alpha = Math.max(0.2, p.life / 24);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = alpha;
                ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 3, 3);
                ctx.globalAlpha = 1;
            });
        }

        function drawPixelCloud(x, y, width) {
            const size = 8;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(x, y, size * 3, size);
            ctx.fillRect(x + size, y - size, size * 2, size);
            ctx.fillRect(x - size, y, size, size);
            ctx.fillRect(x + size * 3, y, size, size);
        }

        function drawMelos(x, y) {
            // Body
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(x + 8, y + 12, 16, 20);
            
            // Head
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(x + 10, y, 12, 12);
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 12, y + 4, 3, 3);
            ctx.fillRect(x + 17, y + 4, 3, 3);
            
            // Arms (running motion)
            const armSwing = Math.sin(frameCount * 0.2) * 4;
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(x + 4, y + 16 + armSwing, 4, 12);
            ctx.fillRect(x + 24, y + 16 - armSwing, 4, 12);
            
            // Legs (running motion)
            const legSwing = Math.sin(frameCount * 0.3) * 6;
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(x + 10, y + 32, 4, 8 + Math.abs(legSwing));
            ctx.fillRect(x + 18, y + 32, 4, 8 + Math.abs(-legSwing));
        }

        function drawHome(x, y) {
            // 目立つ赤屋根の「メロスの家」
            ctx.fillStyle = '#a3382a';
            ctx.fillRect(x + 8, y + 6, 86, 24);
            ctx.fillRect(x, y + 24, 104, 12);

            // 壁
            ctx.fillStyle = '#d8b88b';
            ctx.fillRect(x + 6, y + 36, 92, 90);

            // 扉
            ctx.fillStyle = '#5e3d25';
            ctx.fillRect(x + 42, y + 78, 22, 48);

            // 窓
            ctx.fillStyle = '#9dd8ff';
            ctx.fillRect(x + 18, y + 56, 14, 14);
            ctx.fillRect(x + 72, y + 56, 14, 14);
            ctx.strokeStyle = '#5e3d25';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 18, y + 56, 14, 14);
            ctx.strokeRect(x + 72, y + 56, 14, 14);

            // 煙突
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x + 72, y - 8, 12, 20);

            // 看板で家を明示
            ctx.fillStyle = '#4b2b18';
            ctx.fillRect(x + 30, y + 24, 44, 12);
            ctx.fillStyle = '#ffd700';
            ctx.font = '8px "PixelMplus12", "Press Start 2P", monospace';
            ctx.fillText('MELOS', x + 33, y + 33);

            // ドア前の灯り
            ctx.fillStyle = '#ffd54a';
            ctx.fillRect(x + 48, y + 96, 10, 10);
        }

        function drawObstacle(obstacle) {
            const x = obstacle.x;
            const y = obstacle.y;
            const previousAlpha = ctx.globalAlpha;

            if (obstacle.elevatedType === 'balloon') {
                // ちゃんとした気球（球体 + 索具 + バスケット）
                // 球体
                ctx.fillStyle = '#7d3fc3';
                ctx.fillRect(x - 10, y - 66, 52, 8);
                ctx.fillRect(x - 14, y - 58, 60, 10);
                ctx.fillStyle = '#9b64da';
                ctx.fillRect(x - 16, y - 48, 64, 16);
                ctx.fillRect(x - 12, y - 32, 56, 12);
                ctx.fillStyle = '#b98af0';
                ctx.fillRect(x - 4, y - 56, 40, 8);

                // 口元（球体の下）
                ctx.fillStyle = '#5a2d8c';
                ctx.fillRect(x + 8, y - 20, 16, 6);

                // 索具（ロープ）
                ctx.fillStyle = '#c9a46a';
                ctx.fillRect(x + 10, y - 14, 2, 10);
                ctx.fillRect(x + 20, y - 14, 2, 10);
                ctx.fillRect(x + 6, y - 12, 2, 8);
                ctx.fillRect(x + 24, y - 12, 2, 8);

                // バスケット
                ctx.fillStyle = '#7b4a24';
                ctx.fillRect(x + 4, y - 4, 24, 12);
                ctx.fillStyle = '#9a6234';
                ctx.fillRect(x + 6, y - 2, 20, 8);
            } else if (obstacle.elevatedType === 'rooftop') {
                // 奥の家（当たり判定なし）から兵士が射る
                ctx.globalAlpha = 0.26;
                const houseY = y + obstacle.height;
                ctx.fillStyle = '#8d5f3a';
                ctx.fillRect(x - 14, houseY + 8, 58, 40);      // 壁
                ctx.fillStyle = '#6d3d2a';
                ctx.fillRect(x - 18, houseY, 66, 12);          // 屋根
                ctx.fillStyle = '#4f2f1d';
                ctx.fillRect(x - 4, houseY + 26, 12, 22);      // 扉
                ctx.fillStyle = '#9dd8ff';
                ctx.fillRect(x + 18, houseY + 20, 10, 10);     // 窓
            }
            
            switch(obstacle.type.name) {
                case 'king':
                    // Crown
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(x + 8, y, 28, 10);
                    ctx.fillRect(x + 10, y - 6, 5, 6);
                    ctx.fillRect(x + 19, y - 6, 5, 6);
                    ctx.fillRect(x + 28, y - 6, 5, 6);
                    
                    // Body
                    ctx.fillStyle = '#9b30ff';
                    ctx.fillRect(x + 6, y + 10, 30, 40);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 12, y + 10, 18, 14);
                    
                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 16, y + 16, 3, 3);
                    ctx.fillRect(x + 24, y + 16, 3, 3);
                    if (obstacle.boss) {
                        // ラスボス感を出すマント
                        ctx.fillStyle = '#4b1f78';
                        ctx.fillRect(x + 2, y + 16, 40, 42);
                    }
                    break;
                    
                case 'soldier':
                    // Helmet
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(x + 6, y, 16, 10);
                    
                    // Body
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(x + 4, y + 10, 20, 28);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 8, y + 10, 12, 10);
                    
                    // Sword
                    ctx.fillStyle = '#c0c0c0';
                    ctx.fillRect(x + 22, y + 15, 4, 20);
                    break;
                    
                case 'villager':
                    // Hat
                    ctx.fillStyle = '#d2691e';
                    ctx.fillRect(x + 4, y, 16, 8);
                    
                    // Body
                    ctx.fillStyle = '#4169e1';
                    ctx.fillRect(x + 4, y + 8, 16, 28);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 6, y + 8, 12, 10);
                    break;
                    
                case 'rock':
                    ctx.fillStyle = '#696969';
                    ctx.fillRect(x, y, 40, 32);
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(x + 4, y + 4, 12, 12);
                    ctx.fillRect(x + 20, y + 8, 16, 16);
                    break;
                    
                case 'tree':
                    // Trunk
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(x + 12, y + 24, 12, 32);
                    
                    // Leaves (pixel style)
                    ctx.fillStyle = '#228b22';
                    ctx.fillRect(x + 4, y + 12, 28, 8);
                    ctx.fillRect(x + 8, y + 4, 20, 8);
                    ctx.fillRect(x, y + 20, 36, 12);
                    break;

                case 'archer':
                    // 気球搭乗時は「カゴの中」にいる見た目にする
                    if (obstacle.elevatedType === 'balloon') {
                        // 上半身のみ見せる（下半身はカゴに隠れる）
                        ctx.fillStyle = '#2f4f4f';
                        ctx.fillRect(x + 10, y - 18, 12, 8); // フード
                        ctx.fillStyle = '#ffdbac';
                        ctx.fillRect(x + 12, y - 12, 8, 8); // 顔
                        ctx.fillStyle = '#3b5f7a';
                        ctx.fillRect(x + 9, y - 4, 14, 9); // 胴上部
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 6, y - 6, 2, 14); // 弓
                        ctx.fillRect(x + 6, y - 6, 5, 2);
                        ctx.fillRect(x + 6, y + 6, 5, 2);

                        // カゴの前縁を最後に描いて「中に乗っている」見え方を作る
                        ctx.fillStyle = '#6c3f1f';
                        ctx.fillRect(x + 4, y + 1, 24, 5);
                        break;
                    }

                    if (obstacle.elevatedType === 'rooftop') {
                        // 屋上に立って射ってくる兵士風の見た目
                        ctx.fillStyle = '#4a4a4a';
                        ctx.fillRect(x + 6, y - 2, 16, 10); // 兜
                        ctx.fillStyle = '#ffdbac';
                        ctx.fillRect(x + 9, y + 6, 12, 9); // 顔
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 5, y + 14, 20, 20); // 鎧
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 2, y + 12, 2, 20); // 弓
                        ctx.fillRect(x + 2, y + 12, 6, 2);
                        ctx.fillRect(x + 2, y + 30, 6, 2);
                        break;
                    }

                    const archerY = y;
                    // フード
                    ctx.fillStyle = '#2f4f4f';
                    ctx.fillRect(x + 6, archerY, 16, 10);
                    // 顔
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 9, archerY + 8, 12, 10);
                    // 体
                    ctx.fillStyle = '#3b5f7a';
                    ctx.fillRect(x + 5, archerY + 18, 20, 24);
                    // 弓
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(x + 2, archerY + 16, 2, 22);
                    ctx.fillRect(x + 2, archerY + 16, 6, 2);
                    ctx.fillRect(x + 2, archerY + 36, 6, 2);
                    break;
            }
            ctx.globalAlpha = previousAlpha;
        }

        function drawHorseChaser(chaser) {
            const x = chaser.x;
            const y = chaser.y;
            // 馬体
            ctx.fillStyle = '#6b3f24';
            ctx.fillRect(x + 18, y + 10, 28, 14);
            ctx.fillRect(x + 8, y + 6, 12, 10);
            // 脚
            ctx.fillRect(x + 34, y + 24, 4, 10);
            ctx.fillRect(x + 24, y + 24, 4, 10);
            ctx.fillRect(x + 12, y + 24, 4, 10);
            // 騎手
            ctx.fillStyle = '#444';
            ctx.fillRect(x + 24, y + 0, 10, 10);
            ctx.fillStyle = '#b33232';
            ctx.fillRect(x + 22, y + 10, 12, 10);
            // 槍
            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(x - 4, y + 4, 14, 2);
        }

        function drawArrow(projectile) {
            const vx = (typeof projectile.vx === 'number') ? projectile.vx : projectile.speed;
            const vy = (typeof projectile.vy === 'number') ? projectile.vy : 0;
            const angle = Math.atan2(vy, vx);
            const x = projectile.x;
            const y = projectile.y;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            if (projectile.variant === 'royal') {
                // 王の強化弾（進行方向へ向く）
                ctx.fillStyle = '#2a1240';
                ctx.fillRect(-2, 1, 26, 8);
                ctx.fillStyle = '#d0a3ff';
                ctx.fillRect(1, 3, 14, 3);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(15, 2, 7, 5);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-3, 3, 2, 2);
                ctx.restore();
                return;
            }

            if (projectile.fromBackground) {
                // 手前に来るほど大きく見せて、奥→手前の飛来感を強調
                const approach = Math.max(0, Math.min(1, (projectile.x + 24) / (player.x + 24)));
                const s = 1 + approach * 0.75;
                const bodyW = Math.round(12 * s);
                const bodyH = Math.max(2, Math.round(2 * s));
                const tipW = Math.max(3, Math.round(4 * s));
                const tipH = Math.max(3, Math.round(4 * s));

                ctx.fillStyle = '#000000';
                ctx.fillRect(-1, 1, bodyW + tipW + 2, bodyH + 2);
                ctx.fillStyle = '#ffe07a';
                ctx.fillRect(1, 2, bodyW, bodyH);
                ctx.fillStyle = '#ff6a6a';
                ctx.fillRect(1 + bodyW, 1, tipW, tipH);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillRect(-4, 2, 2, 2);
                ctx.restore();
                return;
            }

            // 通常矢（進行方向へ向く）
            ctx.fillStyle = '#000000';
            ctx.fillRect(-1, 1, 22, 6);
            ctx.fillStyle = '#ffd866';
            ctx.fillRect(1, 3, 14, 2);
            ctx.fillStyle = '#ff5a5a';
            ctx.fillRect(15, 2, 5, 4);
            ctx.fillRect(20, 3, 3, 2);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-1, 2, 2, 1);
            ctx.fillRect(-1, 5, 2, 1);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
            ctx.fillRect(-5, 3, 2, 2);
            ctx.fillRect(-9, 3, 2, 2);
            ctx.restore();
        }

        function gameOver() {
            gameRunning = false;
            stopBgm();
            updatePlayCursor(false);
            updateDinoButtonUi();
            playHitSfx();
            const cause = deathCause || '力尽きた';
            finalScoreDisplay.innerHTML = `走行距離: ${score}m / ${GOAL_DISTANCE_METERS}m<br>死因: ${cause}`;
            gameOverScreen.style.display = 'flex';
            applyQueuedAutoUpdateIfIdle();
        }

        function winGame() {
            gameRunning = false;
            stopBgm();
            updatePlayCursor(false);
            updateDinoButtonUi();
            playGoalSfx();
            winMessage.textContent = `メロスは無事に家に帰り着いた！\n走行距離: ${score}m`;
            winMessage.style.fontSize = '0.8em';
            winMessage.style.lineHeight = '2';
            winMessage.style.color = '#ffd700';
            winMessage.style.fontFamily = "'PixelMplus12', 'Press Start 2P', monospace";
            winScreen.style.display = 'flex';
            applyQueuedAutoUpdateIfIdle();
        }

        // Draw pixel art on start screen
        milestoneState.previewNumber = readMilestonePreviewFromQuery();
        updateMilestoneByMelosNumber(0);
        drawPixelArtTitle();
        initRealtimeChat();
        updateSiteLockUi();
        startAutoUpdateWatcher();
    </script>
</body>
</html>
