<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戻れメロス - 帰宅ランゲーム</title>
    <style>
        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 18px;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: none;
            overflow: hidden;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameContainer {
            position: relative;
            width: min(calc(100vw - 8px), 920px);
            height: min(calc(100vh - 8px), 920px);
            background: #000;
            border: 8px solid #444;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(100, 100, 255, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            z-index: 10;
        }

        #startScreen {
            position: absolute;
            background: #2c1810;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 10px 20px;
        }
        #startScreen.milestone {
            background: #5b4513;
        }
        #startScreen.milestone::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.9;
            background-image:
                radial-gradient(circle, rgba(255, 239, 153, 0.9) 0 1.3px, rgba(255, 239, 153, 0) 2px),
                radial-gradient(circle, rgba(255, 215, 96, 0.85) 0 1.1px, rgba(255, 215, 96, 0) 1.9px),
                radial-gradient(circle, rgba(255, 247, 201, 0.85) 0 0.9px, rgba(255, 247, 201, 0) 1.7px);
            background-size: 140px 140px, 170px 170px, 120px 120px;
            background-position: 0 -120px, 60px -180px, 110px -80px;
            animation: milestoneGlitterFall 5.6s linear infinite;
        }
        #startScreen.milestone > * {
            position: relative;
            z-index: 1;
        }

        #gameOverScreen, #winScreen {
            display: none;
            background: rgba(0, 0, 0, 0.9);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 40px;
            text-shadow: 4px 4px 0px #000;
            color: #ffd700;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5em;
            margin-bottom: 30px;
            color: #ff4444;
        }

        button {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 1em;
            padding: 15px 30px;
            background: #e1452d;
            color: white;
            border: 4px solid #000;
            cursor: pointer;
            margin: 10px;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.1s;
        }

        button:hover {
            background: #ff5544;
        }

        button:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #000;
        }
        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            box-shadow: 2px 2px 0px #000;
        }

        #score {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 0.92em;
            color: #ffd700;
            text-shadow: 2px 2px 0px #000;
            z-index: 5;
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
        }

        #muteButton {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 6;
            font-size: 0.6em;
            padding: 10px 12px;
            margin: 0;
            background: #2c2c2c;
            border-width: 3px;
            box-shadow: 4px 4px 0px #000;
        }

        #muteButton:hover {
            background: #3a3a3a;
        }
        #dinoButton {
            position: absolute;
            top: 58px;
            right: 12px;
            z-index: 6;
            font-size: 0.68em;
            padding: 11px 14px;
            margin: 0;
            background: #8a5a10;
            border-width: 3px;
            box-shadow: 4px 4px 0px #000;
            display: none;
        }
        #dinoButton:hover {
            background: #9d6a18;
        }

        #instructions {
            font-size: 0.78em;
            margin: 30px;
            text-align: center;
            max-width: 600px;
            line-height: 2;
            color: #ddd;
        }
        #siteLockNotice {
            display: none;
            max-width: min(92%, 680px);
            margin: 8px 0 4px;
            padding: 8px 10px;
            border: 3px solid #8b2525;
            background: rgba(60, 0, 0, 0.6);
            color: #ffd9d9;
            font-size: 0.72em;
            text-align: center;
            line-height: 1.7;
        }

        #chatBoard {
            width: min(92%, 680px);
            margin: 8px 0 14px;
            background: rgba(0, 0, 0, 0.55);
            border: 4px solid #3c3c3c;
            box-shadow: 4px 4px 0 #000;
            padding: 10px;
            color: #f3f3f3;
        }

        #chatBoardContent {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            position: relative;
        }

        #chatMain {
            flex: 1;
            min-width: 0;
            padding-right: 164px;
        }

        #creatorLetter {
            position: absolute;
            top: -16px;
            right: -2px;
            width: 146px;
            min-height: 0;
            padding: 4px 6px 3px;
            --letter-spacing-gap: 3px;
            background: rgba(245, 236, 200, 0.9);
            border: 3px solid #7b6b3f;
            color: #2a1f12;
            box-shadow: 3px 4px 0 #000;
            font-size: 0.56em;
            line-height: 1.35;
            transform: rotate(1.6deg);
            z-index: 2;
        }

        #creatorLetter::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            width: 34px;
            height: 10px;
            transform: translateX(-50%) rotate(-4deg);
            background: rgba(240, 225, 165, 0.8);
            border: 1px solid #8e7c47;
        }

        #creatorLetterTitle {
            font-size: 0.86em;
            margin: var(--letter-spacing-gap) 0;
            line-height: 1.14;
            color: #593d1f;
        }
        #creatorLetterBody {
            margin: 0 0 1px;
            line-height: 1.36;
            white-space: pre-wrap;
            word-break: break-word;
        }

        #chatTitle {
            color: #ffd700;
            font-size: 0.66em;
            margin-bottom: 8px;
        }

        #chatStatus {
            color: #b8e986;
            font-size: 0.56em;
            margin-bottom: 3px;
            min-height: 10px;
        }
        #melosOrdinal {
            color: #ffe89a;
            font-size: 0.62em;
            margin: -4px 0 10px;
            min-height: 10px;
            text-shadow: 2px 2px 0 #000;
            text-align: center;
        }
        .melosCelebrate {
            color: #ffd700;
            margin-right: 4px;
            text-shadow: 2px 2px 0 #000;
        }
        @keyframes milestoneGlitterFall {
            from { background-position: 0 -120px, 60px -180px, 110px -80px; }
            to { background-position: 0 520px, 60px 480px, 110px 560px; }
        }
        #letterNoticeBadge {
            display: none;
            max-width: min(92%, 680px);
            margin: -2px 0 10px;
            padding: 7px 10px;
            border: 3px solid #8b2525;
            background: rgba(120, 10, 10, 0.6);
            color: #ffe5a8;
            font-size: 0.6em;
            line-height: 1.6;
            text-align: center;
            box-shadow: 3px 3px 0 #000;
        }
        #letterNoticeBadge.show {
            display: block;
        }
        #chatLockedNotice {
            display: none;
            padding: 7px 8px;
            margin-bottom: 6px;
            border: 2px solid #7d1f1f;
            background: rgba(70, 0, 0, 0.45);
            color: #ffd8d8;
            font-size: 0.56em;
            line-height: 1.6;
        }

        #chatMessages {
            height: 120px;
            overflow-y: scroll;
            scrollbar-gutter: stable;
            scrollbar-width: thin;
            scrollbar-color: #ffd866 #2a2a2a;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #202020;
            padding: 6px;
            font-size: 0.68em;
            line-height: 1.5;
            margin-bottom: 8px;
            word-break: break-word;
        }
        #chatMessages::-webkit-scrollbar {
            width: 12px;
        }
        #chatMessages::-webkit-scrollbar-track {
            background: #2a2a2a;
            border-left: 1px solid #4a4a4a;
        }
        #chatMessages::-webkit-scrollbar-thumb {
            background: #ffd866;
            border: 2px solid #2a2a2a;
        }
        #chatMessages::-webkit-scrollbar-thumb:hover {
            background: #ffe89a;
        }
        #chatJumpLatestButton {
            display: none;
            margin: -2px 0 8px auto;
            padding: 6px 8px;
            font-size: 0.54em;
            border: 2px solid #202020;
            background: #f0c533;
            color: #2a1f00;
            box-shadow: 2px 2px 0 #000;
        }
        #chatJumpLatestButton.show {
            display: inline-block;
        }
        #letterSeenWrap {
            display: none;
            margin-top: var(--letter-spacing-gap);
            padding-top: var(--letter-spacing-gap);
            padding-bottom: var(--letter-spacing-gap);
            border-top: 1px dashed #7b6b3f;
            color: #3b2b18;
            font-size: 0.84em;
            line-height: 1;
            min-height: 0;
            white-space: normal;
        }
        #letterSeenWrap label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            margin: 0;
            line-height: 1;
            padding-bottom: 0;
        }
        #letterSeenCheckbox {
            margin: 0;
            width: 11px;
            height: 11px;
            flex: 0 0 auto;
        }

        .chatMessage {
            margin-bottom: 4px;
            color: #f5f5f5;
        }

        .chatMeta {
            color: #9ecfff;
        }

        .chatActions {
            margin-left: 6px;
        }

        .chatActionBtn {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            font-size: 0.48em;
            padding: 3px 5px;
            margin-left: 4px;
            background: #2f2f2f;
            color: #fff;
            border: 1px solid #000;
            cursor: pointer;
        }

        #chatControls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .chatInput {
            font-family: 'PixelMplus12', 'Press Start 2P', monospace;
            border: 2px solid #2b2b2b;
            background: #141414;
            color: #fff;
            padding: 6px;
            font-size: 0.75em;
            outline: none;
        }

        #chatNameInput {
            width: 120px;
        }

        #chatInput {
            flex: 1;
            min-width: 180px;
        }

        #chatSendButton {
            font-size: 0.58em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #2f5ea8;
        }

        #chatRefreshButton {
            font-size: 0.58em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #4b4b4b;
        }
        #chatInstantLatestButton {
            font-size: 0.58em;
            padding: 8px 10px;
            margin: 0;
            border-width: 2px;
            box-shadow: 2px 2px 0 #000;
            background: #8a5a10;
        }

        #backToTitleFromGameOver {
            background: #4b4b4b;
        }

        #backToTitleFromGameOver:hover {
            background: #5d5d5d;
        }

        #difficultySelector {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 14px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficultyLabel {
            font-size: 0.66em;
            color: #ffd700;
            text-shadow: 2px 2px 0 #000;
        }

        .difficultyBtn {
            font-size: 0.62em;
            padding: 8px 10px;
            margin: 0;
            border-width: 3px;
            box-shadow: 3px 3px 0 #000;
            background: #2c2c2c;
        }

        .difficultyBtn.active {
            background: #e1452d;
        }

        #pixelArt {
            margin: 30px 0;
            width: 300px;
            height: 200px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2em;
            }
            button {
                font-size: 0.8em;
                padding: 12px 25px;
            }
            #instructions {
                font-size: 0.6em;
                margin: 20px;
            }
            #chatBoard {
                width: 95%;
                padding: 8px;
            }
            #chatBoardContent {
                flex-direction: column;
            }
            #chatMain {
                padding-right: 0;
            }
            #creatorLetter {
                position: static;
                width: 100%;
                min-height: 0;
                transform: none;
                margin-top: 4px;
            }
            #creatorLetter::before {
                display: none;
            }
            #chatMessages {
                height: 100px;
            }
            #chatNameInput {
                width: 100px;
            }
            #chatInput {
                min-width: 120px;
            }
            #difficultySelector {
                margin-bottom: 10px;
                gap: 6px;
            }
            #pixelArt {
                width: 200px;
                height: 130px;
            }
            #gameContainer {
                border-width: 4px;
            }
            #startScreen {
                justify-content: flex-start;
                padding-top: 10px;
                padding-bottom: 28px;
            }
            #muteButton {
                font-size: 0.55em;
                padding: 8px 10px;
            }
            #dinoButton {
                top: 50px;
                right: 10px;
                font-size: 0.58em;
                padding: 9px 10px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="score">残り: 0m</div>
        <button id="muteButton">SOUND: ON</button>
        <button id="dinoButton">恐竜</button>
        
        <div id="startScreen">
            <canvas id="pixelArt" width="300" height="200"></canvas>
            <h1 id="titleHeading">戻れメロス</h1>
            <div id="melosOrdinal">あなたは しらべちゅう の メロスです...</div>
            <div id="letterNoticeBadge">新しい手紙が届いています（ページ最下部を確認）</div>
            <div id="instructions">
                メロスは家に帰らなければならない<br><br>
                PC: スペースでジャンプ（2段まで） / Bで恐竜（1回）<br>
                スマホ: 画面タップでジャンプ（2段まで）<br>
                長押しでジャンプが少しだけ伸びる<br>
                障害物を避けながら家へ急げ！
            </div>
            <div id="difficultySelector">
                <span class="difficultyLabel">難易度</span>
                <button id="easyButton" class="difficultyBtn">EASY</button>
                <button id="normalButton" class="difficultyBtn active">NORMAL</button>
                <button id="hardButton" class="difficultyBtn">HARD</button>
                <button id="europeanExtremeButton" class="difficultyBtn">EUROPEAN EXTREME</button>
            </div>
            <button id="startButton">スタート</button>
            <div id="siteLockNotice">ただいま メンテナンスちゅうです。</div>
            <div id="chatBoard">
                <div id="chatTitle">歴代メロスの掲示板</div>
                <div id="chatStatus">接続準備中...</div>
                <div id="chatLockedNotice">メンテナンス中のため、掲示板は停止しています。</div>
                <div id="chatBoardContent">
                    <div id="chatMain">
                        <div id="chatMessages"></div>
                        <button id="chatJumpLatestButton">最新の書き込みにジャンプ</button>
                        <div id="chatControls">
                            <input id="chatNameInput" class="chatInput" maxlength="12" placeholder="名前">
                            <input id="chatInput" class="chatInput" maxlength="80" placeholder="メッセージ（80字まで）">
                            <button id="chatSendButton">送信</button>
                            <button id="chatRefreshButton">更新</button>
                            <button id="chatInstantLatestButton">最新へ</button>
                        </div>
                    </div>
                    <div id="creatorLetter">
                        <div id="creatorLetterTitle">つくりて からの てがみ</div>
                        <div id="creatorLetterBody">（まだ ありません）</div>
                        <div id="letterSeenWrap">
                            <label><input id="letterSeenCheckbox" type="checkbox"> この手紙を確認した</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="gameOverScreen">
            <h2>ゲームオーバー</h2>
            <div id="finalScore"></div>
            <button id="restartButton">もう一度</button>
            <button id="backToTitleFromGameOver">タイトルへ</button>
        </div>

        <div id="winScreen">
            <h2 style="color: #ffd700;">おめでとう！</h2>
            <div id="winMessage"></div>
            <button id="winRestartButton">もう一度</button>
            <button id="backToTitleFromWin">タイトルへ</button>
        </div>
    </div>

    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <script>
        const gameContainer = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pixelArtCanvas = document.getElementById('pixelArt');
        const pixelCtx = pixelArtCanvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const winRestartButton = document.getElementById('winRestartButton');
        const backToTitleFromGameOver = document.getElementById('backToTitleFromGameOver');
        const backToTitleFromWin = document.getElementById('backToTitleFromWin');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const winMessage = document.getElementById('winMessage');
        const muteButton = document.getElementById('muteButton');
        const dinoButton = document.getElementById('dinoButton');
        const easyButton = document.getElementById('easyButton');
        const normalButton = document.getElementById('normalButton');
        const hardButton = document.getElementById('hardButton');
        const europeanExtremeButton = document.getElementById('europeanExtremeButton');
        const chatStatus = document.getElementById('chatStatus');
        const melosOrdinal = document.getElementById('melosOrdinal');
        const letterNoticeBadge = document.getElementById('letterNoticeBadge');
        const chatBoardContent = document.getElementById('chatBoardContent');
        const chatLockedNotice = document.getElementById('chatLockedNotice');
        const chatMessages = document.getElementById('chatMessages');
        const chatJumpLatestButton = document.getElementById('chatJumpLatestButton');
        const chatNameInput = document.getElementById('chatNameInput');
        const chatInput = document.getElementById('chatInput');
        const chatSendButton = document.getElementById('chatSendButton');
        const chatRefreshButton = document.getElementById('chatRefreshButton');
        const chatInstantLatestButton = document.getElementById('chatInstantLatestButton');
        const creatorLetterBody = document.getElementById('creatorLetterBody');
        const letterSeenWrap = document.getElementById('letterSeenWrap');
        const letterSeenCheckbox = document.getElementById('letterSeenCheckbox');
        const siteLockNotice = document.getElementById('siteLockNotice');

        // Pixel art rendering
        ctx.imageSmoothingEnabled = false;
        pixelCtx.imageSmoothingEnabled = false;

        // Canvas size（縦画面でも圧縮せず、表示領域に合わせる）
        function resizeCanvas() {
            const width = Math.max(360, Math.floor(gameContainer.clientWidth));
            const height = Math.max(500, Math.floor(gameContainer.clientHeight));
            const isPortrait = height > width * 1.05;
            const isTouchLike = window.matchMedia('(pointer:coarse)').matches;
            const mobileZoomOut = isTouchLike ? 1.26 : 1;
            canvas.width = Math.floor(width * mobileZoomOut);
            canvas.height = Math.floor(height * mobileZoomOut);
            BASE_GROUND_Y = isPortrait
                ? Math.floor(canvas.height * 0.64)
                : (canvas.height - 120);
            player.x = Math.floor(canvas.width * 0.67);
            player.y = Math.min(player.y, BASE_GROUND_Y - player.height);
            ctx.imageSmoothingEnabled = false;
        }

        // Game state
        let gameRunning = false;
        let score = 0;
        let distance = 0;
        let gameSpeed = 4;
        let frameCount = 0;
        const DINO_DURATION_FRAMES = 600; // about 10 seconds at 60fps
        const DINO_RECOVERY_INVUL_FRAMES = 36; // short grace after returning to Melos
        const DINO_KICK_RECOVERY_INVUL_FRAMES = 150; // star-like grace after giant dino kick
        const DINO_FIRE_INTERVAL = 48;
        const DINO_FIRE_LIFE = 24;
        const DINO_TANK_STRIKE_DELAY_FRAMES = 300; // about 5 seconds
        const DINO_TANK_HOLD_FRAMES = 20;
        const DINO_TANK_EXIT_SPEED = 13.8;
        const DINO_TANK_FLASH_FRAMES = 7;
        const GIANT_DINO_KICK_WINDUP_FRAMES = 12;
        const GIANT_DINO_SCALE = 5;
        const GIANT_DINO_BASE_WIDTH = 184;
        const GIANT_DINO_BASE_HEIGHT = 92;
        const GOAL_DISTANCE_METERS = 1500;
        const PIXELS_PER_METER = 4;
        const HOME_START_X = -(GOAL_DISTANCE_METERS * PIXELS_PER_METER);
        let terrainScroll = 0;
        let jumpHeld = false;
        let BASE_GROUND_Y = 480;
        const CHASER_WARNING_LEAD = 64;
        let pendingChaserWave = null;
        let chaserWarningTimer = 0;
        let chaserSafetyTimer = 0;
        let chaserPlan = [];
        let chaserPlanIndex = 0;
        let deathCause = '';
        let kingSpawned = false;
        let selectedDifficulty = 'normal';
        let currentDifficulty = null;
        const LOW_SPEC_MODE = window.matchMedia('(max-width: 900px)').matches;
        const PERF = {
            terrainStep: LOW_SPEC_MODE ? 12 : 8,
            groundStripeHeight: LOW_SPEC_MODE ? 14 : 18,
            textureStep: LOW_SPEC_MODE ? 24 : 16,
            textureSize: LOW_SPEC_MODE ? 6 : 8,
            maxProjectiles: LOW_SPEC_MODE ? 24 : 40,
            maxChasers: LOW_SPEC_MODE ? 7 : 12,
            textureFrameSkip: LOW_SPEC_MODE ? 2 : 1
        };
        const DIFFICULTIES = {
            easy: {
                label: 'EASY',

        function buildChaserPlan() {
            const cfg = currentDifficulty || DIFFICULTIES[selectedDifficulty];
            const count = randInt(cfg.chaserAppearMin, cfg.chaserAppearMax);
            if (count <= 0) return [];
            const minMeter = 170;
            const maxMeter = GOAL_DISTANCE_METERS - 150;
            const span = Math.max(1, maxMeter - minMeter);
            const segment = span / count;
            const plan = [];
            for (let i = 0; i < count; i++) {
                const segStart = Math.floor(minMeter + segment * i);
                const segEnd = Math.floor(minMeter + segment * (i + 1));
                const left = Math.max(minMeter, segStart + 24);
                const right = Math.min(maxMeter, segEnd - 24);
                const meter = right > left ? randInt(left, right) : left;
                const burst = randInt(cfg.chaserBurstMin, cfg.chaserBurstMax);
                plan.push({ meter, burst });
            }
            plan.sort((a, b) => a.meter - b.meter);
            return plan;
        }

        function getGroundLevelAt(screenX) {
            const worldX = screenX - terrainScroll;
            const waveA = Math.sin(worldX * 0.006) * 20;
            const waveB = Math.sin(worldX * 0.017 + 1.3) * 12;
            const stepped = Math.round((waveA + waveB) / 4) * 4;
            const offset = Math.max(-40, Math.min(44, stepped));
            return BASE_GROUND_Y + offset;
        }

        function drawTerrain() {
            // ピクセル感を維持しつつ描画負荷を抑える
            const step = PERF.terrainStep;
            const stripeH = PERF.groundStripeHeight;
            for (let x = 0; x < canvas.width; x += step) {
                const groundY = getGroundLevelAt(x);

                // 草地
                ctx.fillStyle = '#6ba353';
                ctx.fillRect(x, 0, step, groundY);

                // 地面の濃淡
                ctx.fillStyle = (Math.floor((x - terrainScroll) / 32) % 2 === 0) ? '#5a9345' : '#6ba353';
                ctx.fillRect(x, groundY - stripeH, step, stripeH);

                // 土
                ctx.fillStyle = '#8b7355';
                ctx.fillRect(x, groundY, step, canvas.height - groundY);
            }

            // 土テクスチャ（決定的パターンでちらつき防止）
            if (frameCount % PERF.textureFrameSkip === 0) {
                const texStep = PERF.textureStep;
                const texSize = PERF.textureSize;
                for (let x = 0; x < canvas.width; x += texStep) {
                    const groundY = getGroundLevelAt(x);
                    for (let y = groundY + texSize; y < canvas.height; y += texStep) {
                        const worldCellX = Math.floor((x - terrainScroll) / texStep);
                        const cellY = Math.floor(y / texStep);
                        if ((worldCellX + cellY) % 5 === 0) {
                            ctx.fillStyle = '#7a6449';
                            ctx.fillRect(x, y, texSize, texSize);
                        }
                    }
                }
            }
        }

        function spawnChaserWave(burstCount) {
            // 3頭時は「2頭連続 + 少し間を空けて1頭」にして、
            // 上級者なら着地リズムで回避できる余地を作る。
            const offsets = [];
            if (burstCount >= 3) {
                offsets.push(
                    0,
                    60 + Math.random() * 14,     // 1-2頭目は近め
                    208 + Math.random() * 34     // 2-3頭目は着地できる間隔
                );
                for (let j = 3; j < burstCount; j++) {
                    offsets.push(offsets[offsets.length - 1] + 74 + Math.random() * 18);
                }
            } else {
                for (let j = 0; j < burstCount; j++) {
                    offsets.push(j * 64 + Math.random() * 24);
                }
            }

            for (let j = 0; j < offsets.length; j++) {
                if (chasers.length >= PERF.maxChasers) break;
                const startX = canvas.width + 92 + offsets[j];
                const riderHeight = 34;
                const groundY = getGroundLevelAt(startX + 24);
                chasers.push({

                    width: 52,
                    height: riderHeight,
                    speed: 1.0 + Math.random() * 0.35 + currentDifficulty.chaserSpeedBonus

            dinoLaunchFx.vx = 7.2;
            dinoLaunchFx.vy = -15.8;
            dinoLaunchFx.rot = 0;
            dinoLaunchFx.life = 180;

            spawnDinoExplosion(dinoTankState.hitX, dinoTankState.hitY - 6, 2.3);
            spawnDinoExplosion(dinoBox.x + dinoBox.width * 0.35, dinoBox.y + dinoBox.height * 0.45, 1.5);
            deactivateDinoMode(false, 'ありがとう', DINO_KICK_RECOVERY_INVUL_FRAMES);
        }

        function getProjectileLimit() {
            const bonus = Math.max(0, Number((currentDifficulty && currentDifficulty.projectileCapBonus) || 0));
            return PERF.maxProjectiles + bonus;
        }

        function getDinoHitbox() {
            const groundY = getGroundLevelAt(player.x + player.width * 0.5);
            return {
                x: player.x - 74,
                y: Math.round(groundY - dinoState.height + dinoState.yOffset),
                width: dinoState.width,
                height: dinoState.height
            };
        }

        function spawnDinoExplosion(cx, cy, power = 1) {
            const count = Math.max(8, Math.floor(10 * power));
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + Math.random() * 0.36;
                const speed = 0.8 + Math.random() * (2.2 + power);
                dinoExplosions.push({
                    x: cx,
                    y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 0.4,
                    life: 18 + Math.floor(Math.random() * 10),
                    color: Math.random() > 0.55 ? '#ffce45' : '#ff6d2d'
                });
            }
        }

        function spawnDinoDust() {
            const dino = getDinoHitbox();
            const footY = dino.y + dino.height - 2;
            for (let i = 0; i < 2; i++) {
                dinoDusts.push({
                    x: dino.x + 26 + Math.random() * 60,
                    y: footY + Math.random() * 4,
                    vx: 0.8 + Math.random() * 0.9,
                    vy: -0.3 - Math.random() * 0.6,
                    life: 14 + Math.floor(Math.random() * 8),
                    size: 2 + Math.floor(Math.random() * 2)
                });
            }
        }

        function spawnDinoFire() {
            const dino = getDinoHitbox();
            dinoFires.push({
                x: dino.x - 2,
                y: dino.y + 24,
                size: 14,
                vx: -6.6,
                vy: -0.1 + Math.random() * 0.2,
                life: DINO_FIRE_LIFE + 16
            });
        }

        function setDeathCauseByObstacle(obstacle) {
            if (obstacle.boss || obstacle.type.name === 'king') {
                deathCause = '王の裁きに倒れた';
                return;
            }
            switch (obstacle.type.name) {
                case 'soldier':
                    deathCause = '兵士に斬られた';
                    break;
                case 'villager':
                    deathCause = '村人に行く手を阻まれた';
                    break;
                case 'rock':
                    deathCause = '岩に激突した';
                    break;
                case 'tree':
                    deathCause = '木に衝突した';
                    break;
                case 'archer':
                    deathCause = '弓兵に接近戦で倒された';
                    break;
                default:
                    deathCause = '障害物に衝突した';
            }
        }

        function escapeHtml(text) {
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function formatTime(ts) {
            const date = new Date(ts || Date.now());
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
        }

        function normalizeModerationText(text) {
            return String(text || '')
                .toLowerCase()
                .normalize('NFKC')
                .replace(/\s+/g, '')
                .replace(/[!！?？.,。・､、\-ー~〜_]/g, '');
        }

        function containsBlockedWord(name, text) {
            const source = `${name || ''}:${text || ''}`;
            const normalized = normalizeModerationText(source);
            return CHAT_BLOCK_PATTERNS.some((pattern) => pattern.test(source) || pattern.test(normalized));
        }

        function getAuditApiBase() {
            return String(chatState.auditApiBase || localStorage.getItem(AUDIT_API_BASE_KEY) || DEFAULT_AUDIT_API_BASE || '')
                .trim()
                .replace(/\/+$/, '');
        }

        async function postAuditLog(payload) {
            const base = getAuditApiBase();
            if (!base) return;
            try {
                await fetch(`${base}/api/audit/log`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify(payload),
                    keepalive: true
                });
            } catch {
                // 監査ログ送信失敗はゲーム進行を止めない
            }
        }

        function getAckedLetterTs() {
            const n = Number(localStorage.getItem(LETTER_ACK_TS_KEY) || 0);
            return Number.isFinite(n) ? n : 0;
        }

        function updateLetterNoticeUi() {
            const letterText = String(chatState.creatorLetter || '').trim();
            const letterTs = Number(chatState.creatorLetterTs || 0);
            const hasLetter = !!letterText && letterTs > 0;
            if (!hasLetter) {
                if (letterNoticeBadge) letterNoticeBadge.classList.remove('show');
                if (letterSeenWrap) letterSeenWrap.style.display = 'none';
                if (letterSeenCheckbox) letterSeenCheckbox.checked = false;
                return;
            }
            const acked = getAckedLetterTs() >= letterTs;
            if (letterSeenWrap) letterSeenWrap.style.display = 'block';
            if (letterSeenCheckbox) letterSeenCheckbox.checked = acked;
            if (letterNoticeBadge) {
                if (acked) letterNoticeBadge.classList.remove('show');
                else letterNoticeBadge.classList.add('show');
            }
        }

        async function postLetterAcknowledgement() {
            const base = getAuditApiBase();
            const letterTs = Number(chatState.creatorLetterTs || 0);
            if (!base || letterTs <= 0) return;
            try {
                await fetch(`${base}/api/letter/ack`, {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({
                        roomTag: NOSTR_ROOM_TAG,
                        letterTs,
                        uid: chatState.selfId || ''
                    }),
                    keepalive: true
                });
            } catch {
                // 確認チェック送信失敗は表示継続でフォールバック
            }
        }

        function updateMelosOrdinalText(value, isFallback = false) {
            if (!melosOrdinal) return;
            const num = Number(value || 0);
            if (num > 0) {
                melosOrdinal.textContent = `あなたは ${num}人目のメロスです`;
                melosOrdinal.dataset.number = String(num);
                return;
            }
            melosOrdinal.dataset.number = '0';
            melosOrdinal.textContent = isFallback
                ? 'あなたのメロス番号を表示できませんでした'
                : 'あなたは しらべちゅう の メロスです...';
        }

        function getMilestoneNumber(value) {
            const num = Number(value || 0);
            if (!Number.isFinite(num)) return 0;
            if (num < MILESTONE_START) return 0;
            if (num % MILESTONE_STEP !== 0) return 0;
            return Math.floor(num);
        }

        function readMilestonePreviewFromQuery() {
            try {
                const params = new URLSearchParams(location.search || '');
                const value = Number(params.get(MILESTONE_PREVIEW_PARAM) || 0);
                if (!Number.isFinite(value) || value <= 0) return 0;
                return Math.floor(value);
            } catch {
                return 0;
            }
        }

        function applyMilestoneUi(milestoneNumber) {
            const n = Number(milestoneNumber || 0);
            const enabled = n > 0;
            startScreen.classList.toggle('milestone', enabled);
            if (melosOrdinal) {
                const currentNum = Number(melosOrdinal.dataset.number || 0);
                const displayNum = currentNum > 0 ? currentNum : n;
                if (displayNum > 0) {
                    melosOrdinal.innerHTML = enabled
                        ? `<span class="melosCelebrate">祝！</span>あなたは ${displayNum}人目のメロスです`
                        : `あなたは ${displayNum}人目のメロスです`;
                }
            }
            milestoneState.activeNumber = enabled ? n : 0;
        }

        function updateMilestoneByMelosNumber(melosNumber) {
            const previewNumber = milestoneState.previewNumber;
            if (previewNumber > 0) {
                applyMilestoneUi(previewNumber);
                milestoneState.pendingSpecialSe = false;
                return;
            }
            const milestoneNumber = getMilestoneNumber(melosNumber);
            if (milestoneNumber <= 0) {
                applyMilestoneUi(0);
                milestoneState.pendingSpecialSe = false;
                return;
            }
            applyMilestoneUi(milestoneNumber);
            const seen = Number(localStorage.getItem(MILESTONE_SEEN_KEY) || 0);
            if (seen !== milestoneNumber) {
                localStorage.setItem(MILESTONE_SEEN_KEY, String(milestoneNumber));
                milestoneState.pendingSpecialSe = true;
            }
        }

        async function refreshMelosOrdinal() {
            const base = getAuditApiBase();
            if (!base) {
                updateMelosOrdinalText(0, true);
                updateMilestoneByMelosNumber(0);
                return;
            }
            const roomTag = encodeURIComponent(NOSTR_ROOM_TAG);
            const deviceUid = encodeURIComponent(String(chatState.selfId || localStorage.getItem('melos_chat_uid') || ''));
            try {
                const res = await fetch(`${base}/api/audit/melos-number?room_tag=${roomTag}&uid=${deviceUid}&_=${Date.now()}`, {
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const num = Number(data && data.melosNumber ? data.melosNumber : 0);
                if (num > 0) {
                    localStorage.setItem(MELOS_NUMBER_CACHE_KEY, String(num));
                    updateMelosOrdinalText(num);
                    updateMilestoneByMelosNumber(num);
                    return;
                }
                throw new Error('invalid_number');
            } catch {
                const cached = Number(localStorage.getItem(MELOS_NUMBER_CACHE_KEY) || 0);
                if (cached > 0) {
                    updateMelosOrdinalText(cached);
                    updateMilestoneByMelosNumber(cached);
                    return;
                }
                updateMelosOrdinalText(0, true);
                updateMilestoneByMelosNumber(0);
            }
        }

        function bytesToHex(bytes) {
            return Array.from(bytes).map((b) => b.toString(16).padStart(2, '0')).join('');
        }

        function hexToBytes(hex) {
            const result = new Uint8Array(hex.length / 2);
            for (let i = 0; i < result.length; i++) {
                result[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
            }
            return result;
        }

        function renderCreatorLetter() {
            if (!creatorLetterBody) return;
            const raw = String(chatState.creatorLetter || '').trim();
            const text = raw.replace(/^\n+/, '');
            creatorLetterBody.textContent = text || '（まだ ありません）';
            updateLetterNoticeUi();
        }

        function loadCachedCreatorLetter() {
            const cachedText = localStorage.getItem(PLAY_LETTER_CACHE_KEY);
            const cachedTs = Number(localStorage.getItem(PLAY_LETTER_TS_CACHE_KEY) || 0);
            if (cachedText == null) return;
            chatState.creatorLetter = String(cachedText).slice(0, 220);
            if (Number.isFinite(cachedTs) && cachedTs > 0) {
                chatState.creatorLetterTs = cachedTs;
            }
        }

        function updateSiteLockUi() {
            const locked = !!chatState.siteLocked;
            if (siteLockNotice) {
                siteLockNotice.style.display = locked ? 'block' : 'none';
                if (locked) {
                    siteLockNotice.textContent = 'ただいま きんきゅうメンテナンスちゅうです。しばらく まってください。';
                }
            }
            if (chatBoardContent) {
                chatBoardContent.style.display = locked ? 'none' : 'flex';
            }
            if (chatLockedNotice) {
                chatLockedNotice.style.display = locked ? 'block' : 'none';
            }
            chatNameInput.disabled = locked;
            chatInput.disabled = locked;
            chatSendButton.disabled = locked;
            chatRefreshButton.disabled = locked;
            chatInstantLatestButton.disabled = locked;
            chatJumpLatestButton.disabled = locked;
            if (locked) {
                chatStatus.textContent = '掲示板はメンテナンス中のため停止しています';
                chatJumpLatestButton.classList.remove('show');
            } else {
                renderChatMessages();
                renderCreatorLetter();
            }
            startButton.disabled = locked;
            startButton.textContent = locked ? 'いまは あそべません' : 'スタート';
            if (locked && gameRunning) {
                deathCause = '緊急メンテナンスで中断した';
                returnToTitle();
            }
        }

        function renderChatMessages() {
            const prevTop = chatMessages.scrollTop;
            const prevHeight = chatMessages.scrollHeight;
            const nearBottomBefore = isChatNearBottom();
            const sorted = Array.from(chatState.messages.values())
                .sort((a, b) => (a.ts || 0) - (b.ts || 0))
                .slice(-50);

            if (sorted.length === 0) {
                chatMessages.innerHTML = '<div class="chatMessage">まだ投稿がありません。</div>';
                chatState.lastRenderedLatestKey = '';
                chatState.pendingLatestCount = 0;
                chatJumpLatestButton.classList.remove('show');
                return;
            }
            const latest = sorted[sorted.length - 1];
            const latestKey = `${latest.key || ''}:${latest.ts || 0}`;
            const hasNewLatest = !!chatState.lastRenderedLatestKey && latestKey !== chatState.lastRenderedLatestKey;

            chatMessages.innerHTML = sorted.map(msg => {
                const safeName = escapeHtml(msg.name || '名無しメロス');
                const safeText = escapeHtml(msg.text || '');
                const time = formatTime(msg.ts);
                const canDeleteAny = !!msg.key && !!chatState.pubkey && !!chatState.pool;
                const actions = canDeleteAny
                    ? `<span class="chatActions"><button class="chatActionBtn" data-action="delete" data-key="${escapeHtml(msg.key)}">削除</button></span>`
                    : '';
                return `<div class="chatMessage"><span class="chatMeta">[${time}] ${safeName}:</span> ${safeText}${actions}</div>`;
            }).join('');
            if (nearBottomBefore || !chatState.lastRenderedLatestKey) {
                scrollChatToLatest();
            } else {
                const heightDelta = chatMessages.scrollHeight - prevHeight;
                chatMessages.scrollTop = prevTop + Math.max(0, heightDelta);
                if (hasNewLatest) {
                    chatState.pendingLatestCount++;
                    updateJumpLatestButton();
                }
            }
            chatState.lastRenderedLatestKey = latestKey;
        }

        function isChatNearBottom() {
            const gap = chatMessages.scrollHeight - (chatMessages.scrollTop + chatMessages.clientHeight);
            return gap <= 10;
        }

        function updateJumpLatestButton() {
            if (chatState.pendingLatestCount <= 0 || isChatNearBottom()) {
                chatJumpLatestButton.classList.remove('show');
                chatJumpLatestButton.textContent = '最新の書き込みにジャンプ';
                return;
            }
            chatJumpLatestButton.classList.add('show');
            chatJumpLatestButton.textContent = `最新の書き込みにジャンプ（${chatState.pendingLatestCount}件）`;
        }

        function scrollChatToLatest() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
            chatState.pendingLatestCount = 0;
            updateJumpLatestButton();
        }

        function buildDeleteConfirmText(messageId) {
            const record = chatState.messages.get(messageId);
            if (!record) {
                return 'このコメントを本当に削除しますか？';
            }
            const name = String(record.name || '名無しメロス').slice(0, 12);
            const text = String(record.text || '').slice(0, 80);
            return `「${name}：${text}」\n本当に削除しますか？`;
        }

        function hasValidDeleteClaim(messageId, authorPubkey) {
            const claimers = chatState.deleteClaims.get(messageId);
            if (!claimers) return false;
            return claimers.size > 0;
        }

        function ingestChatRecord(data, key) {
            if (!data || !data.text) return;
            if (hasValidDeleteClaim(key, data.authorPubkey || '')) {
                chatState.removedEventIds.add(key);
                return;
            }
            if (chatState.removedEventIds.has(key)) return;
            if (chatState.seenEventIds.has(key)) return;
            chatState.seenEventIds.add(key);
            chatState.messages.set(key, { ...data, key });
            if (chatState.messages.size > chatState.maxMessages) {
                const oldestKey = chatState.messages.keys().next().value;
                chatState.messages.delete(oldestKey);
            }
            renderChatMessages();
        }

        function applyDeletedIds(ids) {
            if (!Array.isArray(ids) || ids.length === 0) return;
            let changed = false;
            ids.forEach((id) => {
                const key = String(id || '').trim();
                if (!key) return;
                if (!chatState.removedEventIds.has(key)) {
                    chatState.removedEventIds.add(key);
                    changed = true;
                }
                if (chatState.messages.delete(key)) {
                    changed = true;
                }
            });
            if (changed) renderChatMessages();
        }

        function isTrustedAdminEvent(event) {
            const pub = event && event.pubkey ? String(event.pubkey) : '';
            if (!pub) return false;
            if (chatState.adminPubkey) return chatState.adminPubkey === pub;
            chatState.adminPubkey = pub;
            localStorage.setItem(ADMIN_PUBKEY_STORAGE_KEY, pub);
            return true;
        }

        function ingestModerationEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            if (!payload || !Array.isArray(payload.deletedIds)) return;
            applyDeletedIds(payload.deletedIds);
        }

        function ingestCreatorLetterEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            if (!payload || typeof payload.text !== 'string') return;
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < chatState.creatorLetterTs) return;
            chatState.creatorLetter = String(payload.text || '').slice(0, 220);
            chatState.creatorLetterTs = eventTs;
            localStorage.setItem(PLAY_LETTER_CACHE_KEY, chatState.creatorLetter);
            localStorage.setItem(PLAY_LETTER_TS_CACHE_KEY, String(eventTs));
            renderCreatorLetter();
        }

        function ingestSiteLockEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < chatState.siteLockTs) return;
            chatState.siteLockTs = eventTs;
            chatState.siteLocked = !!(payload && payload.locked);
            updateSiteLockUi();
        }

        function ingestAuditConfigEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            if (!isTrustedAdminEvent(event)) return;
            let payload = null;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                payload = null;
            }
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < chatState.auditConfigTs) return;
            chatState.auditConfigTs = eventTs;
            const base = String(payload && payload.auditApiBase ? payload.auditApiBase : '').trim().replace(/\/+$/, '');
            chatState.auditApiBase = base;
            if (base) {
                localStorage.setItem(AUDIT_API_BASE_KEY, base);
                refreshMelosOrdinal();
            }
        }

        function ingestDeletionEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            chatState.seenEventIds.add(event.id);
            const ids = [];
            (event.tags || []).forEach((tag) => {
                if (Array.isArray(tag) && tag[0] === 'e' && tag[1]) {
                    const targetId = tag[1];
                    const claimers = chatState.deleteClaims.get(targetId) || new Set();
                    claimers.add(event.pubkey || '');
                    chatState.deleteClaims.set(targetId, claimers);
                    ids.push(targetId);
                }
            });
            applyDeletedIds(ids);
        }

        function ingestNostrEvent(event) {
            if (!event || !event.id || chatState.seenEventIds.has(event.id)) return;
            if (event.kind === 5) {
                ingestDeletionEvent(event);
                return;
            }
            if (event.kind === 30078) {
                const dTag = (event.tags || []).find((tag) => Array.isArray(tag) && tag[0] === 'd');
                const dValue = dTag && dTag[1] ? dTag[1] : '';
                if (dValue === NOSTR_MOD_D) {
                    ingestModerationEvent(event);
                    return;
                }
                if (dValue === NOSTR_LETTER_D) {
                    ingestCreatorLetterEvent(event);
                    return;
                }
                if (dValue === NOSTR_SITE_LOCK_D) {
                    ingestSiteLockEvent(event);
                    return;
                }
                if (dValue === NOSTR_AUDIT_CONFIG_D) {
                    ingestAuditConfigEvent(event);
                }
                return;
            }
            if (event.kind !== 1) return;
            const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
            if (eventTs < BOARD_RESET_TS) return;
            let payload;
            try {
                payload = JSON.parse(event.content || '{}');
            } catch {
                return;
            }
            if (!payload || typeof payload.text !== 'string') return;
            ingestChatRecord({
                name: String(payload.name || '名無しメロス').slice(0, 12),
                text: String(payload.text || '').slice(0, 80),
                uid: payload.uid || '',
                authorPubkey: event.pubkey || '',
                ts: eventTs
            }, event.id);
        }

        async function refreshChatMessages() {
            if (!chatState.pool) return;
            try {
                const events = await chatState.pool.list(NOSTR_RELAYS, [{
                    kinds: [1, 5],
                    '#t': [NOSTR_ROOM_TAG],
                    limit: 220
                }]);
                events.forEach(ingestNostrEvent);

                // #d filter is not uniformly supported by all relays.
                let metaEvents = [];
                try {
                    metaEvents = await chatState.pool.list(NOSTR_RELAYS, [{
                        kinds: [30078],
                        '#d': [NOSTR_MOD_D, NOSTR_LETTER_D, NOSTR_SITE_LOCK_D, NOSTR_AUDIT_CONFIG_D],
                        limit: 120
                    }]);
                } catch {
                    metaEvents = await chatState.pool.list(NOSTR_RELAYS, [{
                        kinds: [30078],
                        limit: 160
                    }]);
                }
                metaEvents.forEach(ingestNostrEvent);
                chatState.lastSyncAt = Date.now();
            } catch (error) {
                console.warn('Chat refresh failed:', error);
            }
        }

        function setupRealtimeSubscription() {
            if (!chatState.pool) return;
            if (chatState.liveSub && typeof chatState.liveSub.close === 'function') {
                try { chatState.liveSub.close(); } catch {}
            }
            chatState.liveSub = chatState.pool.subscribeMany(
                NOSTR_RELAYS,
                [
                    { kinds: [1, 5], '#t': [NOSTR_ROOM_TAG], limit: 220 },
                    { kinds: [30078], limit: 120 }
                ],
                {
                    onevent(event) {
                        ingestNostrEvent(event);
                        chatState.lastSyncAt = Date.now();
                    }
                }
            );
        }

        async function restartRealtimeSync(reasonText = '') {
            if (!chatState.pool) return;
            setupRealtimeSubscription();
            await refreshChatMessages();
            if (reasonText) {
                chatStatus.textContent = reasonText;
            }
        }

        function startRealtimeHealthMonitor() {
            if (chatState.healthTimer) {
                clearInterval(chatState.healthTimer);
            }
            chatState.healthTimer = setInterval(async () => {
                if (!chatState.pool) return;
                const staleForMs = Date.now() - (chatState.lastSyncAt || 0);
                if (staleForMs < 25000) return;

        async function fetchRemoteSignature() {
            try {
                const res = await fetch(`${AUTO_UPDATE_TARGET}?_v=${Date.now()}`, { cache: 'no-store' });
                if (!res.ok) return '';
                const text = await res.text();
                // 軽量な差分検知用シグネチャ
                let hash = 2166136261;
                for (let i = 0; i < text.length; i++) {
                    hash ^= text.charCodeAt(i);
                    hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
                }
                return String(hash >>> 0);
            } catch {
                return '';
            }
        }

        function applyQueuedAutoUpdateIfIdle() {

            }
        }

        async function checkForAutoUpdate() {
            const signature = await fetchRemoteSignature();
            if (!signature) return;
            if (!autoUpdateKnownSignature) {
                autoUpdateKnownSignature = signature;
                return;
            }
            if (signature === autoUpdateKnownSignature) return;
            autoUpdateKnownSignature = signature;
            if (gameRunning) {
                autoUpdateQueued = true;
                chatStatus.textContent = '新しいバージョンを検出: このプレイ終了後に自動更新します';
                return;
            }
            location.reload();
        }

        function startAutoUpdateWatcher() {
            const isTouchLike = window.matchMedia('(pointer:coarse)').matches;

            if (autoUpdateTimer) clearInterval(autoUpdateTimer);
            checkForAutoUpdate();
            autoUpdateTimer = setInterval(checkForAutoUpdate, AUTO_UPDATE_INTERVAL_MS);

        async function prepareAudio() {
            if (sound.initialized || sound.failed) return;
            if (typeof Tone === 'undefined') {
                sound.failed = true;
                return;
            }
            try {
                await Tone.start();
                Tone.Transport.bpm.value = 138;

                sound.leadSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.08, sustain: 0.2, release: 0.08 }
                }).toDestination();

                sound.bassSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.12, sustain: 0.35, release: 0.12 }
                }).toDestination();

                sound.jumpSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.02 }
                }).toDestination();

                sound.hitSynth = new Tone.NoiseSynth({
                    noise: { type: 'pink' },
                    envelope: { attack: 0.001, decay: 0.12, sustain: 0, release: 0.06 }
                }).toDestination();

                sound.goalSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.3, release: 0.2 }
                }).toDestination();
                sound.milestoneSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.005, decay: 0.14, sustain: 0.15, release: 0.18 }
                }).toDestination();

                // 通常: A♭ホールトーン / 恐竜中: B♭ホールトーン
                const leadPatternNormal = ['G#5', 'A#5', 'C6', 'D6', 'E6', 'F#6', 'D6', 'C6'];
                const bassPatternNormal = ['G#2', null, 'C3', null, 'D3', null, 'F#2', null];
                const leadPatternDino = ['A#5', 'C6', 'D6', 'E6', 'F#6', 'G#6', 'E6', 'D6'];
                const bassPatternDino = ['A#2', null, 'D3', null, 'E3', null, 'G#2', null];

                sound.loop = new Tone.Loop((time) => {
                    const leadPattern = dinoState.active ? leadPatternDino : leadPatternNormal;
                    const bassPattern = dinoState.active ? bassPatternDino : bassPatternNormal;
                    const index = sound.step % leadPattern.length;
                    const leadNote = leadPattern[index];
                    const bassNote = bassPattern[index];
                    if (leadNote) sound.leadSynth.triggerAttackRelease(leadNote, '16n', time, 0.18);
                    if (bassNote) sound.bassSynth.triggerAttackRelease(bassNote, '8n', time, 0.15);
                    sound.step++;
                }, '8n');

                sound.initialized = true;
                updateMuteButton();
            } catch (error) {
                sound.failed = true;
                console.warn('Audio initialization failed:', error);
            }
        }

        function startBgm() {
            if (!sound.initialized || sound.muted || !sound.loop) return;
            sound.step = 0;
            sound.loop.start(0);
            if (Tone.Transport.state !== 'started') {
                Tone.Transport.start();
            }
        }

        function stopBgm() {
            if (!sound.initialized || !sound.loop) return;
            sound.loop.stop(0);
            Tone.Transport.stop();
            Tone.Transport.position = 0;
        }

        function playJumpSfx() {

        function playHitSfx() {

        function playGoalSfx() {

            sound.goalSynth.triggerAttackRelease(['C5', 'E5', 'G5'], '8n', now, 0.22);

        function playMilestoneSfx() {

            sound.milestoneSynth.triggerAttackRelease(['A4', 'D5', 'F#5'], '16n', now + 0.14, 0.22);

        function gameLoop() {
            if (!gameRunning) return;

            update();
