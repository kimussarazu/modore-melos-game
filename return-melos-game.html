        async function prepareAudio() {
            if (sound.initialized || sound.failed) return;
            if (typeof Tone === 'undefined') {
                sound.failed = true;
                return;
            }
            try {
                await Tone.start();
                Tone.Transport.bpm.value = 138;

                sound.leadSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.08, sustain: 0.2, release: 0.08 }
                }).toDestination();

                sound.bassSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.12, sustain: 0.35, release: 0.12 }
                }).toDestination();

                sound.jumpSynth = new Tone.Synth({
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.001, decay: 0.05, sustain: 0, release: 0.02 }
                }).toDestination();

                sound.hitSynth = new Tone.NoiseSynth({
                    noise: { type: 'pink' },
                    envelope: { attack: 0.001, decay: 0.12, sustain: 0, release: 0.06 }
                }).toDestination();

                sound.goalSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: 'square' },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0.3, release: 0.2 }
                }).toDestination();

                // A♭ホールトーン（Ab, Bb, C, D, E, F#）中心の8bitループ
                const leadPattern = ['G#5', 'A#5', 'C6', 'D6', 'E6', 'F#6', 'D6', 'C6'];
                const bassPattern = ['G#2', null, 'C3', null, 'D3', null, 'F#2', null];

                sound.loop = new Tone.Loop((time) => {
                    const index = sound.step % leadPattern.length;
                    const leadNote = leadPattern[index];
                    const bassNote = bassPattern[index];
                    if (leadNote) sound.leadSynth.triggerAttackRelease(leadNote, '16n', time, 0.18);
                    if (bassNote) sound.bassSynth.triggerAttackRelease(bassNote, '8n', time, 0.15);
                    sound.step++;
                }, '8n');

                sound.initialized = true;
                updateMuteButton();
            } catch (error) {
                sound.failed = true;
                console.warn('Audio initialization failed:', error);
            }
        }

        function startBgm() {
            if (!sound.initialized || sound.muted || !sound.loop) return;
            sound.step = 0;
            sound.loop.start(0);
            if (Tone.Transport.state !== 'started') {
                Tone.Transport.start();
            }
        }

        function stopBgm() {
            if (!sound.initialized || !sound.loop) return;
            sound.loop.stop(0);
            Tone.Transport.stop();
            Tone.Transport.position = 0;
        }

        function playJumpSfx() {
            if (!sound.initialized || sound.muted || !sound.jumpSynth) return;
            sound.jumpSynth.triggerAttackRelease('G5', '32n', undefined, 0.2);
        }

        function playHitSfx() {
            if (!sound.initialized || sound.muted || !sound.hitSynth) return;
            sound.hitSynth.triggerAttackRelease('16n', undefined, 0.25);
        }

        function playGoalSfx() {
            if (!sound.initialized || sound.muted || !sound.goalSynth) return;
            const now = Tone.now();
            sound.goalSynth.triggerAttackRelease(['C5', 'E5', 'G5'], '8n', now, 0.22);
            sound.goalSynth.triggerAttackRelease(['D5', 'F5', 'A5'], '8n', now + 0.2, 0.22);
        }

        function toggleMute() {
            sound.muted = !sound.muted;
            if (typeof Tone !== 'undefined') {
                Tone.Destination.mute = sound.muted;
            }
            if (sound.muted) {
                stopBgm();
            } else if (gameRunning) {
                startBgm();
            }
            updateMuteButton();
        }

        function updateMuteButton() {
            muteButton.textContent = sound.muted ? 'SOUND: OFF' : 'SOUND: ON';
        }

        async function startGame() {
            await prepareAudio();
            currentDifficulty = DIFFICULTIES[selectedDifficulty];
            gameRunning = true;
            score = 0;
            distance = 0;
            gameSpeed = currentDifficulty.startSpeed;
            frameCount = 0;
            terrainScroll = 0;
            jumpHeld = false;
            deathCause = '';
            kingSpawned = false;
            pendingChaserWave = null;
            chaserWarningTimer = 0;
            obstacles.length = 0;
            projectiles.length = 0;
            chasers.length = 0;
            player.y = 300;
            player.velocityY = 0;
            player.jumpsUsed = 0;
            player.jumpHoldFrames = 0;
            player.coyoteFrames = 0;
            player.jumpBufferFrames = 0;
            resizeCanvas();
            home.x = HOME_START_X;
            startScreen.style.display = 'none';
            if (!sound.muted) {
                startBgm();
            }
            gameLoop();
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            frameCount++;
            terrainScroll += gameSpeed;
            // ゴール判定（家との接触）と同じ基準で距離を算出
            const totalTravelPixels = (player.x - home.width) - HOME_START_X;
            const traveledPixels = Math.max(0, home.x - HOME_START_X);
            const progressRatio = Math.min(traveledPixels / totalTravelPixels, 1);
            distance = Math.min(GOAL_DISTANCE_METERS, Math.round(progressRatio * GOAL_DISTANCE_METERS));
            score = distance;
            const remaining = Math.max(0, GOAL_DISTANCE_METERS - distance);
            scoreDisplay.textContent = `残り: ${remaining}m [${currentDifficulty.label}]`;

            // Increase difficulty
            if (frameCount % currentDifficulty.speedRampInterval === 0 && gameSpeed < currentDifficulty.maxSpeed) {
                gameSpeed += 0.3;
            }

            // 入力感度を上げる（コヨーテタイム + 入力バッファ）
            if (player.grounded) {
                player.coyoteFrames = player.maxCoyoteFrames;
            } else {
                player.coyoteFrames = Math.max(0, player.coyoteFrames - 1);
            }
            if (player.jumpBufferFrames > 0) {
                player.jumpBufferFrames--;
                jump();
            }

            // Player movement（長押しで滞空時間がより伸びる）
            const canFloat = jumpHeld && player.velocityY < 0 && player.jumpHoldFrames < player.maxJumpHoldFrames;
            if (canFloat) {
                // 押し始めは強く浮き、後半は徐々に通常重力へ戻す
                const holdRatio = player.jumpHoldFrames / player.maxJumpHoldFrames;
                const holdGravityFactor = 0.24 + holdRatio * 0.44;
                player.velocityY += player.gravity * holdGravityFactor;
                player.jumpHoldFrames++;
            } else {
                // 早く離すと上昇が早めに終わり、短いジャンプになる
                if (!jumpHeld && player.velocityY < 0 && player.jumpHoldFrames < player.maxJumpHoldFrames) {
                    player.velocityY += player.gravity * 0.68;
                }
                player.velocityY += player.gravity;
            }
            player.velocityY = Math.max(-13, Math.min(10, player.velocityY));
            player.y += player.velocityY;

            // Ground collision
            const groundLevel = getGroundLevelAt(player.x + player.width * 0.5);
            if (player.y + player.height > groundLevel) {
                player.y = groundLevel - player.height;
                player.velocityY = 0;
                player.grounded = true;
                player.jumpsUsed = 0;
                player.jumpHoldFrames = 0;
                if (player.jumpBufferFrames > 0) {
                    jump();
                }
            } else if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            } else {
                player.grounded = false;
            }

            // Update home position (moves RIGHT as player moves LEFT)
            home.x += gameSpeed;

            // Check if reached home
            if (home.x + home.width >= player.x && home.x <= player.x + player.width) {
                winGame();
                return;
            }

            // 終盤に王様をラスボスとして1体だけ出現
            const remainingMeters = Math.max(0, GOAL_DISTANCE_METERS - distance);
            if (!kingSpawned && remainingMeters <= 380) {
                const kingGround = getGroundLevelAt(-70 + KING_BOSS.width * 0.5);
                obstacles.push({
                    x: -70,
                    y: kingGround - KING_BOSS.height,
                    width: KING_BOSS.width,
                    height: KING_BOSS.height,
                    type: KING_BOSS,
                    flying: false,
                    followsGround: true,
                    elevatedType: null,
                    towerHeight: 0,
                    boss: true
                });
                kingSpawned = true;
            }

            // Create obstacles (more frequently for longer game)
            const kingActive = obstacles.some(ob => ob.boss);
            if (!kingActive && frameCount % currentDifficulty.obstacleSpawnInterval === 0) {
                const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
                // 奥にいる敵（櫓/気球）は弓兵のみ
                const canBeElevated = type.name === 'archer';
                const isFlying = canBeElevated && Math.random() > 0.62;
                const spawnGroundY = getGroundLevelAt(-50 + type.width * 0.5);
                let spawnY = isFlying ? 150 + Math.random() * 150 : spawnGroundY - type.height;
                let elevatedType = null;
                let structureHeight = 0;
                if (isFlying) {
                    elevatedType = Math.random() > 0.45 ? 'balloon' : 'rooftop';
                    if (elevatedType === 'balloon') {
                        spawnY = 130 + Math.random() * 120;
                    } else {
                        structureHeight = 52 + Math.floor(Math.random() * 18);
                        spawnY = spawnGroundY - type.height - structureHeight;
                    }
                }
                if (type.name === 'archer') {
                    if (!isFlying) spawnY = spawnGroundY - type.height;
                }
                obstacles.push({
                    x: -50,
                    y: spawnY,
                    width: type.width,
                    height: type.height,
                    type: type,
                    flying: isFlying,
                    followsGround: !isFlying || elevatedType === 'rooftop',
                    elevatedType: elevatedType,
                    structureHeight: structureHeight
                });
            }

            // 騎馬追手の予告「！」を出した後に、後方から出現
            const warningPhase = currentDifficulty.chaserSpawnInterval - CHASER_WARNING_LEAD;
            if (!pendingChaserWave && frameCount % currentDifficulty.chaserSpawnInterval === warningPhase) {
                if (Math.random() > 0.42) {
                    pendingChaserWave = {
                        timer: CHASER_WARNING_LEAD,
                        burst: 1 + Math.floor(Math.random() * 2)
                    };
                    chaserWarningTimer = CHASER_WARNING_LEAD;
                }
            }
            if (pendingChaserWave) {
                pendingChaserWave.timer--;
                chaserWarningTimer = pendingChaserWave.timer;
                if (pendingChaserWave.timer <= 0) {
                    spawnChaserWave(pendingChaserWave.burst);
                    pendingChaserWave = null;
                    chaserWarningTimer = 0;
                }
            }

            // Update obstacles (move RIGHT)
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x += gameSpeed;
                if (obstacles[i].followsGround) {
                    const obstacleGround = getGroundLevelAt(obstacles[i].x + obstacles[i].width * 0.5);
                    const supportHeight = obstacles[i].elevatedType === 'rooftop' ? obstacles[i].structureHeight : 0;
                    obstacles[i].y = obstacleGround - obstacles[i].height - supportHeight;
                }

                // Remove off-screen obstacles
                if (obstacles[i].x > canvas.width) {
                    obstacles.splice(i, 1);
                    continue;
                }

                // 奥レイヤー（櫓/気球）は接触しない。地上の敵のみ接触判定
                const obstacleHitbox = getObstacleHitbox(obstacles[i]);
                if (obstacleHitbox && checkCollision(player, obstacleHitbox)) {
                    setDeathCauseByObstacle(obstacles[i]);
                    gameOver();
                    return;
                }

                // 弓兵は一定間隔で矢を発射
                if (obstacles[i].type.name === 'archer' && frameCount % currentDifficulty.archerFireInterval === 0) {
                    if (projectiles.length >= PERF.maxProjectiles) continue;
                    const isBackgroundArcher = !!obstacles[i].elevatedType;
                    const spawnX = obstacles[i].x + obstacles[i].width;
                    const spawnY = isBackgroundArcher
                        ? (obstacles[i].elevatedType === 'balloon' ? obstacles[i].y - 2 : obstacles[i].y + 10)
                        : obstacles[i].y + 17;

                    if (isBackgroundArcher) {
                        // 発射時のみ未来位置を狙う（追尾はしない）
                        const targetX = player.x + player.width * 0.8 + gameSpeed * 20;
                        const targetY = player.y + player.height * 0.58;
                        const dx = targetX - spawnX;
                        const dy = targetY - spawnY;
                        const length = Math.hypot(dx, dy) || 1;
                        const shotSpeed = gameSpeed + currentDifficulty.projectileSpeedBonus + 0.8;
                        projectiles.push({
                            x: spawnX,
                            y: spawnY,
                            width: 18,
                            height: 6,
                            vx: (dx / length) * shotSpeed,
                            vy: (dy / length) * shotSpeed,
                            fromBackground: true,
                            variant: 'arrow'
                        });
                    } else {
                        projectiles.push({
                            x: spawnX,
                            y: spawnY,
                            width: 24,
                            height: 8,
                            speed: gameSpeed + currentDifficulty.projectileSpeedBonus,
                            variant: 'arrow'
                        });
                    }
                }

                // 王様ラスボスは強化弾を連射
                if (obstacles[i].boss && frameCount % 56 === 0) {
                    if (projectiles.length >= PERF.maxProjectiles) continue;
                    const baseX = obstacles[i].x + obstacles[i].width;
                    const baseY = obstacles[i].y + 20;
                    for (let s = -1; s <= 1; s++) {
                        if (projectiles.length >= PERF.maxProjectiles) break;
                        projectiles.push({
                            x: baseX,
                            y: baseY + s * 10,
                            width: 28,
                            height: 10,
                            speed: gameSpeed + currentDifficulty.projectileSpeedBonus + 1.8,
                            variant: 'royal'
                        });
                    }
                }
            }

            // Update projectiles (move RIGHT)
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (typeof projectiles[i].vx === 'number') {
                    projectiles[i].x += projectiles[i].vx;
                    projectiles[i].y += projectiles[i].vy;
                } else {
                    projectiles[i].x += projectiles[i].speed;
                }

                if (
                    projectiles[i].x > canvas.width + 30 ||
                    projectiles[i].y < -40 ||
                    projectiles[i].y > canvas.height + 40
                ) {
                    projectiles.splice(i, 1);
                    continue;
                }

                if (checkCollision(player, projectiles[i])) {
                    deathCause = projectiles[i].variant === 'royal' ? '王の強化弾に撃たれた' : '矢に撃ち抜かれた';
                    gameOver();
                    return;
                }
            }

            // 騎馬追手（画面右から左へ）
            for (let i = chasers.length - 1; i >= 0; i--) {
                chasers[i].x -= chasers[i].speed;
                const chaseGround = getGroundLevelAt(chasers[i].x + chasers[i].width * 0.45);
                chasers[i].y = chaseGround - chasers[i].height;

                if (chasers[i].x + chasers[i].width < -40) {
                    chasers.splice(i, 1);
                    continue;
                }
                // 見た目より少し小さい当たり判定で、ギリ回避しやすくする
                const chaserHitbox = {
                    x: chasers[i].x + 7,
                    y: chasers[i].y + 8,
                    width: 36,
                    height: 24
                };
                if (checkCollision(player, chaserHitbox)) {
                    deathCause = '騎馬追手に轢かれた';
                    gameOver();
                    return;
                }
            }

            // Update clouds (move RIGHT)
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width) {
                    cloud.x = -cloud.width;
                    cloud.y = Math.random() * 150 + 20;
                }
            });
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function getObstacleHitbox(obstacle) {
            // 奥にある櫓・気球は演出専用（接触しない）
            if (obstacle.elevatedType) return null;

            // 木は見た目より当たり判定を細く（幹中心）
            if (obstacle.type.name === 'tree') {
                return {
                    x: obstacle.x + 11,
                    y: obstacle.y + 22,
                    width: 14,
                    height: 34
                };
            }

            return obstacle;
        }

        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#5b9bd5');
            gradient.addColorStop(0.4, '#8fbbe5');
            gradient.addColorStop(0.7, '#c7e0f4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw pixel clouds
            clouds.forEach(cloud => {
                drawPixelCloud(cloud.x, cloud.y, cloud.width);
            });

            // 起伏地形
            drawTerrain();

            // Draw home if visible
            if (home.x > -home.width && home.x < canvas.width) {
                const homeGroundY = getGroundLevelAt(home.x + home.width * 0.5);
                drawHome(home.x, homeGroundY - home.height);
            }

            // 奥の敵（櫓/気球）を先に描画
            obstacles.forEach(obstacle => {
                if (obstacle.elevatedType) drawObstacle(obstacle);
            });

            // Draw player (Red Melos) - pixel art style
            drawMelos(player.x, player.y);

            // 手前の敵を後で描画
            obstacles.forEach(obstacle => {
                if (!obstacle.elevatedType) drawObstacle(obstacle);
            });

            // Draw horse chasers
            chasers.forEach(chaser => {
                drawHorseChaser(chaser);
            });

            // 騎馬追手の接近予告（終盤ほど速く点滅）
            if (chaserWarningTimer > 0) {
                const blinkSpan = chaserWarningTimer > 28 ? 5 : 2;
                if (Math.floor(chaserWarningTimer / blinkSpan) % 2 === 0) {
                    const warningX = canvas.width - 108;
                    const warningY = 180;
                    const urgent = chaserWarningTimer < 22;

                    // 外枠
                    ctx.fillStyle = urgent ? '#5a0d0d' : '#2a1a12';
                    ctx.fillRect(warningX, warningY, 70, 52);
                    // 内側
                    ctx.fillStyle = urgent ? '#ffb347' : '#ffe173';
                    ctx.fillRect(warningX + 4, warningY + 4, 62, 44);

                    // 右から来る向きのミニ馬シルエット
                    ctx.fillStyle = '#4a2b19';
                    ctx.fillRect(warningX + 10, warningY + 28, 20, 8);
                    ctx.fillRect(warningX + 28, warningY + 25, 8, 6);
                    ctx.fillRect(warningX + 13, warningY + 36, 3, 6);
                    ctx.fillRect(warningX + 21, warningY + 36, 3, 6);
                    ctx.fillRect(warningX + 31, warningY + 36, 3, 6);

                    // 強調マーク
                    ctx.fillStyle = '#8b0000';
                    ctx.font = urgent
                        ? '26px "PixelMplus12", "Press Start 2P", monospace'
                        : '22px "PixelMplus12", "Press Start 2P", monospace';
                    ctx.fillText(urgent ? '!!' : '!', warningX + 40, warningY + 38);
                }
            }

            // Draw arrows
            projectiles.forEach(projectile => {
                drawArrow(projectile);
            });

            // Progress indicator
            const progress = Math.min(distance / GOAL_DISTANCE_METERS, 1);
            ctx.fillStyle = '#000';
            ctx.fillRect(10, canvas.height - 30, 200, 20);
            ctx.fillStyle = '#e1452d';
            ctx.fillRect(12, canvas.height - 28, 196 * progress, 16);
            ctx.fillStyle = '#ffd700';
            ctx.font = '12px "PixelMplus12", "Press Start 2P", monospace';
            const remainMeters = Math.max(0, GOAL_DISTANCE_METERS - distance);
            ctx.fillText(`${remainMeters}m`, 215, canvas.height - 15);
        }

        function drawPixelCloud(x, y, width) {
            const size = 8;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.fillRect(x, y, size * 3, size);
            ctx.fillRect(x + size, y - size, size * 2, size);
            ctx.fillRect(x - size, y, size, size);
            ctx.fillRect(x + size * 3, y, size, size);
        }

        function drawMelos(x, y) {
            const ch = CHARACTERS[selectedCharacter] || CHARACTERS.vo;
            // Body
            ctx.fillStyle = ch.bodyColor;
            ctx.fillRect(x + 8, y + 12, 16, 20);
            
            // Head
            ctx.fillStyle = ch.skinColor;
            ctx.fillRect(x + 10, y, 12, 12);

            // Hair
            ctx.fillStyle = ch.hairColor;
            ctx.fillRect(x + 10, y, 12, 4);
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 12, y + 4, 3, 3);
            ctx.fillRect(x + 17, y + 4, 3, 3);
            
            // Arms (running motion)
            const armSwing = Math.sin(frameCount * 0.2) * 4;
            ctx.fillStyle = ch.bodyColor;
            ctx.fillRect(x + 4, y + 16 + armSwing, 4, 12);
            ctx.fillRect(x + 24, y + 16 - armSwing, 4, 12);
            
            // Legs (running motion)
            const legSwing = Math.sin(frameCount * 0.3) * 6;
            ctx.fillStyle = ch.bodyColor;
            ctx.fillRect(x + 10, y + 32, 4, 8 + Math.abs(legSwing));
            ctx.fillRect(x + 18, y + 32, 4, 8 + Math.abs(-legSwing));

            ctx.fillStyle = ch.accentColor;
            if (ch.accessory === 'sword') {
                ctx.fillRect(x + 24, y + 18, 4, 16);
                ctx.fillStyle = '#7ce8cc';
                ctx.fillRect(x + 24, y + 10, 4, 8);
            } else if (ch.accessory === 'bass') {
                ctx.fillRect(x + 2, y + 18, 6, 10);
                ctx.fillRect(x + 0, y + 22, 2, 8);
            } else if (ch.accessory === 'stick') {
                ctx.fillStyle = '#d6b06c';
                ctx.fillRect(x + 24, y + 20, 8, 2);
            } else {
                ctx.fillStyle = '#ddd';
                ctx.fillRect(x + 22, y + 18, 5, 2);
            }
        }

        function drawHome(x, y) {
            // 目立つ赤屋根の「メロスの家」
            ctx.fillStyle = '#a3382a';
            ctx.fillRect(x + 8, y + 6, 86, 24);
            ctx.fillRect(x, y + 24, 104, 12);

            // 壁
            ctx.fillStyle = '#d8b88b';
            ctx.fillRect(x + 6, y + 36, 92, 90);

            // 扉
            ctx.fillStyle = '#5e3d25';
            ctx.fillRect(x + 42, y + 78, 22, 48);

            // 窓
            ctx.fillStyle = '#9dd8ff';
            ctx.fillRect(x + 18, y + 56, 14, 14);
            ctx.fillRect(x + 72, y + 56, 14, 14);
            ctx.strokeStyle = '#5e3d25';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 18, y + 56, 14, 14);
            ctx.strokeRect(x + 72, y + 56, 14, 14);

            // 煙突
            ctx.fillStyle = '#8b4513';
            ctx.fillRect(x + 72, y - 8, 12, 20);

            // 看板で家を明示
            ctx.fillStyle = '#4b2b18';
            ctx.fillRect(x + 30, y + 24, 44, 12);
            ctx.fillStyle = '#ffd700';
            ctx.font = '8px "PixelMplus12", "Press Start 2P", monospace';
            ctx.fillText('MELOS', x + 33, y + 33);

            // ドア前の灯り
            ctx.fillStyle = '#ffd54a';
            ctx.fillRect(x + 48, y + 96, 10, 10);
        }

        function drawObstacle(obstacle) {
            const x = obstacle.x;
            const y = obstacle.y;
            const previousAlpha = ctx.globalAlpha;

            if (obstacle.elevatedType === 'balloon') {
                // ちゃんとした気球（球体 + 索具 + バスケット）
                // 球体
                ctx.fillStyle = '#7d3fc3';
                ctx.fillRect(x - 10, y - 66, 52, 8);
                ctx.fillRect(x - 14, y - 58, 60, 10);
                ctx.fillStyle = '#9b64da';
                ctx.fillRect(x - 16, y - 48, 64, 16);
                ctx.fillRect(x - 12, y - 32, 56, 12);
                ctx.fillStyle = '#b98af0';
                ctx.fillRect(x - 4, y - 56, 40, 8);

                // 口元（球体の下）
                ctx.fillStyle = '#5a2d8c';
                ctx.fillRect(x + 8, y - 20, 16, 6);

                // 索具（ロープ）
                ctx.fillStyle = '#c9a46a';
                ctx.fillRect(x + 10, y - 14, 2, 10);
                ctx.fillRect(x + 20, y - 14, 2, 10);
                ctx.fillRect(x + 6, y - 12, 2, 8);
                ctx.fillRect(x + 24, y - 12, 2, 8);

                // バスケット
                ctx.fillStyle = '#7b4a24';
                ctx.fillRect(x + 4, y - 4, 24, 12);
                ctx.fillStyle = '#9a6234';
                ctx.fillRect(x + 6, y - 2, 20, 8);
            } else if (obstacle.elevatedType === 'rooftop') {
                // 奥の家（当たり判定なし）から兵士が射る
                ctx.globalAlpha = 0.26;
                const houseY = y + obstacle.height;
                ctx.fillStyle = '#8d5f3a';
                ctx.fillRect(x - 14, houseY + 8, 58, 40);      // 壁
                ctx.fillStyle = '#6d3d2a';
                ctx.fillRect(x - 18, houseY, 66, 12);          // 屋根
                ctx.fillStyle = '#4f2f1d';
                ctx.fillRect(x - 4, houseY + 26, 12, 22);      // 扉
                ctx.fillStyle = '#9dd8ff';
                ctx.fillRect(x + 18, houseY + 20, 10, 10);     // 窓
            }
            
            switch(obstacle.type.name) {
                case 'king':
                    // Crown
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(x + 8, y, 28, 10);
                    ctx.fillRect(x + 10, y - 6, 5, 6);
                    ctx.fillRect(x + 19, y - 6, 5, 6);
                    ctx.fillRect(x + 28, y - 6, 5, 6);
                    
                    // Body
                    ctx.fillStyle = '#9b30ff';
                    ctx.fillRect(x + 6, y + 10, 30, 40);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 12, y + 10, 18, 14);
                    
                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.fillRect(x + 16, y + 16, 3, 3);
                    ctx.fillRect(x + 24, y + 16, 3, 3);
                    if (obstacle.boss) {
                        // ラスボス感を出すマント
                        ctx.fillStyle = '#4b1f78';
                        ctx.fillRect(x + 2, y + 16, 40, 42);
                    }
                    break;
                    
                case 'soldier':
                    // Helmet
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(x + 6, y, 16, 10);
                    
                    // Body
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(x + 4, y + 10, 20, 28);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 8, y + 10, 12, 10);
                    
                    // Sword
                    ctx.fillStyle = '#c0c0c0';
                    ctx.fillRect(x + 22, y + 15, 4, 20);
                    break;
                    
                case 'villager':
                    // Hat
                    ctx.fillStyle = '#d2691e';
                    ctx.fillRect(x + 4, y, 16, 8);
                    
                    // Body
                    ctx.fillStyle = '#4169e1';
                    ctx.fillRect(x + 4, y + 8, 16, 28);
                    
                    // Face
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 6, y + 8, 12, 10);
                    break;
                    
                case 'rock':
                    ctx.fillStyle = '#696969';
                    ctx.fillRect(x, y, 40, 32);
                    ctx.fillStyle = '#808080';
                    ctx.fillRect(x + 4, y + 4, 12, 12);
                    ctx.fillRect(x + 20, y + 8, 16, 16);
                    break;
                    
                case 'tree':
                    // Trunk
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(x + 12, y + 24, 12, 32);
                    
                    // Leaves (pixel style)
                    ctx.fillStyle = '#228b22';
                    ctx.fillRect(x + 4, y + 12, 28, 8);
                    ctx.fillRect(x + 8, y + 4, 20, 8);
                    ctx.fillRect(x, y + 20, 36, 12);
                    break;

                case 'archer':
                    // 気球搭乗時は「カゴの中」にいる見た目にする
                    if (obstacle.elevatedType === 'balloon') {
                        // 上半身のみ見せる（下半身はカゴに隠れる）
                        ctx.fillStyle = '#2f4f4f';
                        ctx.fillRect(x + 10, y - 18, 12, 8); // フード
                        ctx.fillStyle = '#ffdbac';
                        ctx.fillRect(x + 12, y - 12, 8, 8); // 顔
                        ctx.fillStyle = '#3b5f7a';
                        ctx.fillRect(x + 9, y - 4, 14, 9); // 胴上部
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 6, y - 6, 2, 14); // 弓
                        ctx.fillRect(x + 6, y - 6, 5, 2);
                        ctx.fillRect(x + 6, y + 6, 5, 2);

                        // カゴの前縁を最後に描いて「中に乗っている」見え方を作る
                        ctx.fillStyle = '#6c3f1f';
                        ctx.fillRect(x + 4, y + 1, 24, 5);
                        break;
                    }

                    if (obstacle.elevatedType === 'rooftop') {
                        // 屋上に立って射ってくる兵士風の見た目
                        ctx.fillStyle = '#4a4a4a';
                        ctx.fillRect(x + 6, y - 2, 16, 10); // 兜
                        ctx.fillStyle = '#ffdbac';
                        ctx.fillRect(x + 9, y + 6, 12, 9); // 顔
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 5, y + 14, 20, 20); // 鎧
                        ctx.fillStyle = '#8b4513';
                        ctx.fillRect(x + 2, y + 12, 2, 20); // 弓
                        ctx.fillRect(x + 2, y + 12, 6, 2);
                        ctx.fillRect(x + 2, y + 30, 6, 2);
                        break;
                    }

                    const archerY = y;
                    // フード
                    ctx.fillStyle = '#2f4f4f';
                    ctx.fillRect(x + 6, archerY, 16, 10);
                    // 顔
                    ctx.fillStyle = '#ffdbac';
                    ctx.fillRect(x + 9, archerY + 8, 12, 10);
                    // 体
                    ctx.fillStyle = '#3b5f7a';
                    ctx.fillRect(x + 5, archerY + 18, 20, 24);
                    // 弓
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(x + 2, archerY + 16, 2, 22);
                    ctx.fillRect(x + 2, archerY + 16, 6, 2);
                    ctx.fillRect(x + 2, archerY + 36, 6, 2);
                    break;
            }
            ctx.globalAlpha = previousAlpha;
        }

        function drawHorseChaser(chaser) {
            const x = chaser.x;
            const y = chaser.y;
            // 馬体
            ctx.fillStyle = '#6b3f24';
            ctx.fillRect(x + 4, y + 10, 28, 14);
            ctx.fillRect(x + 28, y + 6, 12, 10);
            // 脚
            ctx.fillRect(x + 8, y + 24, 4, 10);
            ctx.fillRect(x + 18, y + 24, 4, 10);
            ctx.fillRect(x + 30, y + 24, 4, 10);
            // 騎手
            ctx.fillStyle = '#444';
            ctx.fillRect(x + 14, y + 0, 10, 10);
            ctx.fillStyle = '#b33232';
            ctx.fillRect(x + 12, y + 10, 12, 10);
            // 槍
            ctx.fillStyle = '#c0c0c0';
            ctx.fillRect(x + 34, y + 4, 14, 2);
        }

        function drawArrow(projectile) {
            const vx = (typeof projectile.vx === 'number') ? projectile.vx : projectile.speed;
            const vy = (typeof projectile.vy === 'number') ? projectile.vy : 0;
            const angle = Math.atan2(vy, vx);
            const x = projectile.x;
            const y = projectile.y;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            if (projectile.variant === 'royal') {
                // 王の強化弾（進行方向へ向く）
                ctx.fillStyle = '#2a1240';
                ctx.fillRect(-2, 1, 26, 8);
                ctx.fillStyle = '#d0a3ff';
                ctx.fillRect(1, 3, 14, 3);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(15, 2, 7, 5);
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-3, 3, 2, 2);
                ctx.restore();
                return;
            }

            if (projectile.fromBackground) {
                // 手前に来るほど大きく見せて、奥→手前の飛来感を強調
                const approach = Math.max(0, Math.min(1, (projectile.x + 24) / (player.x + 24)));
                const s = 1 + approach * 0.75;
                const bodyW = Math.round(12 * s);
                const bodyH = Math.max(2, Math.round(2 * s));
                const tipW = Math.max(3, Math.round(4 * s));
                const tipH = Math.max(3, Math.round(4 * s));

                ctx.fillStyle = '#000000';
                ctx.fillRect(-1, 1, bodyW + tipW + 2, bodyH + 2);
                ctx.fillStyle = '#ffe07a';
                ctx.fillRect(1, 2, bodyW, bodyH);
                ctx.fillStyle = '#ff6a6a';
                ctx.fillRect(1 + bodyW, 1, tipW, tipH);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fillRect(-4, 2, 2, 2);
                ctx.restore();
                return;
            }

            // 通常矢（進行方向へ向く）
            ctx.fillStyle = '#000000';
            ctx.fillRect(-1, 1, 22, 6);
            ctx.fillStyle = '#ffd866';
            ctx.fillRect(1, 3, 14, 2);
            ctx.fillStyle = '#ff5a5a';
            ctx.fillRect(15, 2, 5, 4);
            ctx.fillRect(20, 3, 3, 2);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-1, 2, 2, 1);
            ctx.fillRect(-1, 5, 2, 1);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
            ctx.fillRect(-5, 3, 2, 2);
            ctx.fillRect(-9, 3, 2, 2);
            ctx.restore();
        }

        function gameOver() {
            gameRunning = false;
            stopBgm();
            playHitSfx();
            const cause = deathCause || '力尽きた';
            finalScoreDisplay.innerHTML = `走行距離: ${score}m / ${GOAL_DISTANCE_METERS}m<br>死因: ${cause}`;
            gameOverScreen.style.display = 'flex';
        }

        function winGame() {
            gameRunning = false;
            stopBgm();
            playGoalSfx();
            winMessage.textContent = `メロスは無事に家に帰り着いた！\n走行距離: ${score}m`;
            winMessage.style.fontSize = '0.8em';
            winMessage.style.lineHeight = '2';
            winMessage.style.color = '#ffd700';
            winMessage.style.fontFamily = "'PixelMplus12', 'Press Start 2P', monospace";
            winScreen.style.display = 'flex';
        }

        // 初期表示を強制復元（ブラウザ履歴復帰時の黒画面対策）
        returnToTitle();
        window.addEventListener('pageshow', () => {
            if (!gameRunning && gameOverScreen.style.display !== 'flex' && winScreen.style.display !== 'flex') {
                returnToTitle();
            }
        });
        initRealtimeChat();
    </script>
</body>
</html>
