<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戻れメロス 掲示板管理</title>
    <script src="https://cdn.jsdelivr.net/npm/nostr-tools@2.7.2/lib/nostr.bundle.js"></script>
    <style>
        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'PixelMplus12';
            src: url('./PixelMplus12-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 18px;
            background: #0f1020;
            color: #f1f1f1;
            font-family: 'PixelMplus12', monospace;
            line-height: 1.6;
        }
        .panel {
            max-width: 980px;
            margin: 0 auto 14px;
            padding: 12px;
            border: 3px solid #2e3159;
            background: rgba(0, 0, 0, 0.45);
            box-shadow: 4px 4px 0 #000;
        }
        h1, h2 { margin: 0 0 8px; color: #ffd86f; }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, textarea, button {
            font-family: inherit;
            border: 2px solid #2f2f2f;
            background: #141414;
            color: #fff;
            padding: 8px;
        }
        input, textarea { flex: 1; min-width: 220px; }
        textarea { min-height: 86px; resize: vertical; }
        button {
            cursor: pointer;
            background: #2f5ea8;
            min-width: 110px;
        }
        button.secondary { background: #4d4d4d; }
        #status { color: #b8e986; min-height: 20px; }
        #commentList {
            max-height: 380px;
            overflow-y: auto;
            border: 2px solid #202020;
            background: rgba(20, 20, 20, 0.9);
            padding: 8px;
        }
        .commentItem {
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.95rem;
        }
        .meta { color: #9ecfff; }
        .empty { color: #c6c6c6; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>掲示板 管理画面</h1>
        <div class="row">
            <input id="secretInput" placeholder="管理者のNostr秘密鍵（hex）">
            <button id="connectBtn">管理者として接続</button>
            <button id="refreshBtn" class="secondary">再読み込み</button>
        </div>
        <div style="font-size:0.9rem; color:#d2d2d2; margin-top:6px;">※ 「管理者として接続」は、秘密鍵で管理者認証して削除・手紙更新を有効化します。</div>
        <div id="status">未接続</div>
        <div id="liveStatus" style="font-size:0.86rem; color:#9ecfff;">リアルタイム: 未接続</div>
    </div>

    <div class="panel">
        <h2>過去コメント削除</h2>
        <div class="row" style="margin-bottom:8px;">
            <button id="selectAllBtn" class="secondary">全選択</button>
            <button id="clearSelectBtn" class="secondary">選択解除</button>
            <button id="deleteSelectedBtn">選択を削除</button>
            <button id="purgeAllBtn" class="secondary">取得済みを全削除</button>
        </div>
        <div class="row" style="margin-bottom:8px;">
            <input id="directDeleteInput" placeholder="見えないコメントを文字列指定で削除（例: 銀河 GGG!!）">
            <button id="directDeleteBtn" class="secondary">文字列で検索して削除</button>
        </div>
        <div id="commentList"><div class="empty">コメントを読み込み中...</div></div>
    </div>

    <div class="panel">
        <h2>つくりての手紙（右側表示）</h2>
        <textarea id="letterInput" maxlength="220" placeholder="ここに書いた文が掲示板の右側に表示されます"></textarea>
        <div class="row" style="margin-top:8px;">
            <button id="saveLetterBtn">手紙を掲示</button>
            <button id="deleteLetterBtn" class="secondary">手紙を削除</button>
        </div>
        <div id="letterStatus" style="margin-top:8px; color:#b8e986;">手紙状態: 未確認</div>
    </div>

    <script>
        const NOSTR_RELAYS = [
            'wss://relay.damus.io',
            'wss://nos.lol',
            'wss://relay.nostr.band'
        ];
        const NOSTR_ROOM_TAG = 'modore-melos-board-v1';
        const NOSTR_MOD_D = 'melos-moderation-v1';
        const NOSTR_LETTER_D = 'melos-creator-letter-v1';
        const BOARD_RESET_TS = Date.parse('2026-03-04T12:52:00Z');
        const RELAY_TIMEOUT_MS = 4200;

        const secretInput = document.getElementById('secretInput');
        const connectBtn = document.getElementById('connectBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusEl = document.getElementById('status');
        const liveStatusEl = document.getElementById('liveStatus');
        const commentList = document.getElementById('commentList');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const clearSelectBtn = document.getElementById('clearSelectBtn');
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
        const purgeAllBtn = document.getElementById('purgeAllBtn');
        const directDeleteInput = document.getElementById('directDeleteInput');
        const directDeleteBtn = document.getElementById('directDeleteBtn');
        const letterInput = document.getElementById('letterInput');
        const saveLetterBtn = document.getElementById('saveLetterBtn');
        const deleteLetterBtn = document.getElementById('deleteLetterBtn');
        const letterStatusEl = document.getElementById('letterStatus');

        const state = {
            pool: null,
            seckey: null,
            pubkey: '',
            messages: new Map(),
            selected: new Set(),
            removedEventIds: new Set(),
            adminDeletedIds: new Set(),
            letterTs: 0,
            pendingLetterText: null,
            liveSub: null
        };

        function escapeHtml(text) {
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;');
        }

        function formatTime(ts) {
            const d = new Date(ts || Date.now());
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return `${y}/${m}/${day} ${hh}:${mm}`;
        }

        function hasRoomTag(event) {
            return (event.tags || []).some((tag) => Array.isArray(tag) && tag[0] === 't' && tag[1] === NOSTR_ROOM_TAG);
        }

        function normalizeText(text) {
            return String(text || '')
                .toLowerCase()
                .replace(/\[[0-9]{1,2}:[0-9]{2}\]/g, '')
                .replace(/\s+/g, '')
                .trim();
        }

        function hexToBytes(hex) {
            const clean = String(hex || '').trim();
            if (!/^[0-9a-fA-F]{64}$/.test(clean)) return null;
            const out = new Uint8Array(32);
            for (let i = 0; i < 32; i++) {
                out[i] = parseInt(clean.slice(i * 2, i * 2 + 2), 16);
            }
            return out;
        }

        function withTimeout(promise, timeoutMs, fallbackValue) {
            return Promise.race([
                promise,
                new Promise((resolve) => setTimeout(() => resolve(fallbackValue), timeoutMs))
            ]);
        }

        async function listFromRelay(relay, filters, timeoutMs = RELAY_TIMEOUT_MS) {
            if (!state.pool) return [];
            try {
                const result = await withTimeout(
                    state.pool.list([relay], filters),
                    timeoutMs,
                    []
                );
                return Array.isArray(result) ? result : [];
            } catch {
                return [];
            }
        }

        function renderComments() {
            const rows = Array.from(state.messages.values())
                .filter((msg) => !state.removedEventIds.has(msg.id))
                .sort((a, b) => (b.ts || 0) - (a.ts || 0));

            if (rows.length === 0) {
                commentList.innerHTML = '<div class="empty">表示できるコメントはありません。</div>';
                return;
            }

            commentList.innerHTML = rows.map((msg) => {
                const checked = state.selected.has(msg.id) ? 'checked' : '';
                return `
                    <div class="commentItem">
                        <label>
                            <input type="checkbox" data-id="${escapeHtml(msg.id)}" ${checked}>
                            <span class="meta">[${formatTime(msg.ts)}] ${escapeHtml(msg.name || '名無しメロス')}</span>
                        </label>
                        <div>${escapeHtml(msg.text || '')}</div>
                    </div>
                `;
            }).join('');
        }

        function applyDeletedIds(ids) {
            (ids || []).forEach((id) => {
                const key = String(id || '').trim();
                if (!key) return;
                state.removedEventIds.add(key);
                state.messages.delete(key);
                state.selected.delete(key);
            });
        }

        function ingestEvent(event) {
            if (!event || !event.id) return;
            if (event.kind === 1) {
                const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
                if (eventTs < BOARD_RESET_TS) return;
                let payload;
                try {
                    payload = JSON.parse(event.content || '{}');
                } catch {
                    payload = null;
                }
                if (!payload || typeof payload.text !== 'string') return;
                const uid = String(payload.uid || '');
                if (!hasRoomTag(event) && !uid.startsWith('uid_')) return;
                state.messages.set(event.id, {
                    id: event.id,
                    name: String(payload.name || '名無しメロス').slice(0, 12),
                    text: String(payload.text || '').slice(0, 80),
                    ts: eventTs
                });
                return;
            }
            if (event.kind === 5) {
                if (!hasRoomTag(event)) return;
                const ids = [];
                (event.tags || []).forEach((tag) => {
                    if (Array.isArray(tag) && tag[0] === 'e' && tag[1]) {
                        ids.push(tag[1]);
                    }
                });
                applyDeletedIds(ids);
                return;
            }
            if (event.kind === 30078) {
                const dTag = (event.tags || []).find((tag) => Array.isArray(tag) && tag[0] === 'd');
                const dValue = dTag && dTag[1] ? dTag[1] : '';
                if (dValue === NOSTR_MOD_D) {
                    let payload;
                    try {
                        payload = JSON.parse(event.content || '{}');
                    } catch {
                        payload = null;
                    }
                    if (payload && Array.isArray(payload.deletedIds)) {
                        payload.deletedIds.forEach((id) => {
                            const key = String(id || '').trim();
                            if (key) state.adminDeletedIds.add(key);
                        });
                        applyDeletedIds(payload.deletedIds);
                    }
                    return;
                }
                if (dValue === NOSTR_LETTER_D) {
                    const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
                    if (eventTs < state.letterTs) return;
                    let payload;
                    try {
                        payload = JSON.parse(event.content || '{}');
                    } catch {
                        payload = null;
                    }
                    state.letterTs = eventTs;
                    const nextText = payload && typeof payload.text === 'string' ? payload.text.slice(0, 220) : '';
                    letterInput.value = nextText;
                    if (state.pendingLetterText === null || state.pendingLetterText === nextText) {
                        letterStatusEl.textContent = '手紙状態: 反映完了';
                        state.pendingLetterText = null;
                    } else {
                        letterStatusEl.textContent = '手紙状態: 反映済み';
                    }
                }
            }
        }

        async function loadBoardData() {
            if (!state.pool) return;
            statusEl.textContent = '読み込み中...（高速モード）';
            state.messages.clear();
            state.selected.clear();
            state.removedEventIds.clear();
            state.adminDeletedIds.clear();
            state.letterTs = 0;
            renderComments();

            const boardFilters = [{
                kinds: [1, 5],
                '#t': [NOSTR_ROOM_TAG],
                limit: 120
            }];
            const boardWideFilters = [{
                kinds: [1, 5],
                '#t': [NOSTR_ROOM_TAG],
                limit: 320
            }];
            const metaFiltersPrimary = [{
                kinds: [30078],
                '#d': [NOSTR_MOD_D, NOSTR_LETTER_D],
                limit: 60
            }];
            const metaFiltersFallback = [{
                kinds: [30078],
                limit: 80
            }];

            const boardResults = await Promise.all(
                NOSTR_RELAYS.map((relay) => listFromRelay(relay, boardFilters, RELAY_TIMEOUT_MS))
            );
            boardResults.flat().forEach(ingestEvent);
            renderComments();
            statusEl.textContent = `コメント読み込み中...（${state.messages.size}件）`;

            // If sparse, query each relay again with wider limits.
            if (state.messages.size < 8) {
                const wideResults = await Promise.all(
                    NOSTR_RELAYS.map((relay) => listFromRelay(relay, boardWideFilters, RELAY_TIMEOUT_MS + 1200))
                );
                wideResults.flat().forEach(ingestEvent);
                renderComments();
            }

            // Some relays don't support #t filtering well. Fetch broad, then filter by tags client-side.
            if (state.messages.size < 8) {
                const broadNoTagResults = await Promise.all(
                    NOSTR_RELAYS.map((relay) => listFromRelay(relay, [{ kinds: [1, 5], limit: 260 }], RELAY_TIMEOUT_MS))
                );
                broadNoTagResults.flat().forEach(ingestEvent);
                renderComments();
            }

            const metaResultsPrimary = await Promise.all(
                NOSTR_RELAYS.map((relay) => listFromRelay(relay, metaFiltersPrimary, Math.floor(RELAY_TIMEOUT_MS * 0.85)))
            );
            const primaryCount = metaResultsPrimary.reduce((n, arr) => n + arr.length, 0);
            const metaEvents = primaryCount > 0
                ? metaResultsPrimary.flat()
                : (await Promise.all(
                    NOSTR_RELAYS.map((relay) => listFromRelay(relay, metaFiltersFallback, Math.floor(RELAY_TIMEOUT_MS * 0.85)))
                )).flat();
            metaEvents.forEach(ingestEvent);
            renderComments();

            if (state.messages.size === 0) {
                statusEl.textContent = '読み込み完了（0件）: まだ投稿がないか、サーバー履歴の応答待ちです';
                return;
            }
            statusEl.textContent = `読み込み完了（${state.messages.size}件）`;
        }

        function startRealtimeSync() {
            if (!state.pool) return;
            if (state.liveSub && typeof state.liveSub.close === 'function') {
                try { state.liveSub.close(); } catch {}
            }
            const since = Math.floor(Date.now() / 1000) - 5;
            state.liveSub = state.pool.subscribeMany(
                NOSTR_RELAYS,
                [{ kinds: [1, 5, 30078], since }],
                {
                    onevent(event) {
                        const before = state.messages.size;
                        ingestEvent(event);
                        if (state.messages.size !== before || event.kind !== 1) {
                            renderComments();
                        }
                        if (event.kind === 1) {
                            liveStatusEl.textContent = 'リアルタイム: 新着コメントを受信しました';
                        } else if (event.kind === 30078) {
                            liveStatusEl.textContent = 'リアルタイム: 管理更新を受信しました';
                        }
                    }
                }
            );
            liveStatusEl.textContent = 'リアルタイム: 接続中（自動反映）';
        }

        function publishEvent(template) {
            if (!state.pool || !state.seckey) return false;
            const signed = NostrTools.finalizeEvent(template, state.seckey);
            state.pool.publish(NOSTR_RELAYS, signed);
            return true;
        }

        function publishModerationDelete(ids) {
            const unique = Array.from(new Set((ids || []).map((v) => String(v || '').trim()).filter(Boolean)));
            if (unique.length === 0) return;
            const ok = publishEvent({
                kind: 30078,
                created_at: Math.floor(Date.now() / 1000),
                tags: [
                    ['d', NOSTR_MOD_D],
                    ['t', NOSTR_ROOM_TAG]
                ],
                content: JSON.stringify({
                    deletedIds: unique
                })
            });
            if (!ok) return;
            unique.forEach((id) => state.adminDeletedIds.add(id));
            applyDeletedIds(unique);
            renderComments();
            statusEl.textContent = `${unique.length}件を削除反映しました`;
        }

        async function deleteByKeyword() {
            if (!state.pool) {
                statusEl.textContent = '先に管理者として接続してください';
                return;
            }
            const raw = (directDeleteInput.value || '').trim();
            const key = normalizeText(raw);
            if (key.length < 2) {
                statusEl.textContent = '検索文字は2文字以上で入力してください';
                return;
            }
            statusEl.textContent = '文字列検索で履歴を確認中...';

            const filtersTagged = [{ kinds: [1], '#t': [NOSTR_ROOM_TAG], limit: 520 }];
            const filtersWide = [{ kinds: [1], limit: 700 }];

            const tagged = await Promise.all(
                NOSTR_RELAYS.map((relay) => listFromRelay(relay, filtersTagged, RELAY_TIMEOUT_MS + 1800))
            );
            const wide = await Promise.all(
                NOSTR_RELAYS.map((relay) => listFromRelay(relay, filtersWide, RELAY_TIMEOUT_MS + 1800))
            );

            const allEvents = [...tagged.flat(), ...wide.flat()];
            const ids = [];
            const seen = new Set();
            allEvents.forEach((event) => {
                if (!event || !event.id || seen.has(event.id)) return;
                seen.add(event.id);
                let payload = null;
                try {
                    payload = JSON.parse(event.content || '{}');
                } catch {
                    payload = null;
                }
                if (!payload || typeof payload.text !== 'string') return;
                const uid = String(payload.uid || '');
                if (!hasRoomTag(event) && !uid.startsWith('uid_')) return;
                const eventTs = (event.created_at || Math.floor(Date.now() / 1000)) * 1000;
                if (eventTs < BOARD_RESET_TS) return;
                const candidate = normalizeText(`${payload.name || ''}:${payload.text || ''}`);
                if (candidate.includes(key)) {
                    ids.push(event.id);
                }
            });

            if (ids.length === 0) {
                statusEl.textContent = '一致するコメントが見つかりませんでした';
                return;
            }
            publishModerationDelete(ids);
        }

        function publishCreatorLetter(text) {
            const safeText = String(text || '').slice(0, 220);
            state.pendingLetterText = safeText;
            letterStatusEl.textContent = '手紙状態: 反映待ち...';
            const ok = publishEvent({
                kind: 30078,
                created_at: Math.floor(Date.now() / 1000),
                tags: [
                    ['d', NOSTR_LETTER_D],
                    ['t', NOSTR_ROOM_TAG]
                ],
                content: JSON.stringify({
                    text: safeText
                })
            });
            if (!ok) return;
            statusEl.textContent = safeText ? '手紙を更新しました' : '手紙を削除しました';
            letterStatusEl.textContent = '手紙状態: 反映完了（送信済み）';
            setTimeout(() => {
                loadBoardData();
            }, 1200);
            setTimeout(() => {
                loadBoardData();
            }, 2600);
        }

        connectBtn.addEventListener('click', async () => {
            if (typeof NostrTools === 'undefined') {
                statusEl.textContent = 'nostr-toolsの読み込みに失敗しました';
                return;
            }
            const sec = hexToBytes(secretInput.value);
            if (!sec) {
                statusEl.textContent = '秘密鍵は64桁hexで入力してください';
                return;
            }
            try {
                state.seckey = sec;
                state.pubkey = NostrTools.getPublicKey(sec);
                state.pool = new NostrTools.SimplePool();
                localStorage.setItem('melos_admin_pubkey', state.pubkey);
                statusEl.textContent = `接続しました: ${state.pubkey.slice(0, 12)}...`;
                await loadBoardData();
                startRealtimeSync();
            } catch (err) {
                console.warn(err);
                statusEl.textContent = '接続に失敗しました';
                liveStatusEl.textContent = 'リアルタイム: 接続失敗';
            }
        });

        refreshBtn.addEventListener('click', loadBoardData);

        commentList.addEventListener('change', (e) => {
            const target = e.target;
            if (!(target instanceof HTMLInputElement)) return;
            const id = target.dataset.id || '';
            if (!id) return;
            if (target.checked) state.selected.add(id);
            else state.selected.delete(id);
        });

        selectAllBtn.addEventListener('click', () => {
            const ids = Array.from(state.messages.keys()).filter((id) => !state.removedEventIds.has(id));
            ids.forEach((id) => state.selected.add(id));
            renderComments();
        });

        clearSelectBtn.addEventListener('click', () => {
            state.selected.clear();
            renderComments();
        });

        deleteSelectedBtn.addEventListener('click', () => {
            const ids = Array.from(state.selected);
            if (ids.length === 0) {
                statusEl.textContent = '削除対象を選択してください';
                return;
            }
            publishModerationDelete(ids);
        });

        purgeAllBtn.addEventListener('click', () => {
            const ids = Array.from(state.messages.keys()).filter((id) => !state.removedEventIds.has(id));
            if (ids.length === 0) {
                statusEl.textContent = '全削除対象がありません';
                return;
            }
            publishModerationDelete(ids);
        });
        directDeleteBtn.addEventListener('click', deleteByKeyword);

        saveLetterBtn.addEventListener('click', () => {
            publishCreatorLetter(letterInput.value);
        });

        deleteLetterBtn.addEventListener('click', () => {
            letterInput.value = '';
            publishCreatorLetter('');
        });

        const cachedSecret = localStorage.getItem('melos_nostr_secret');
        if (cachedSecret) {
            secretInput.value = cachedSecret;
        }
    </script>
</body>
</html>
