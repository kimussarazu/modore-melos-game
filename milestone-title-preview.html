<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝祭タイトルプレビュー</title>
  <style>
    @font-face {
      font-family: 'PixelMplus12';
      src: url('./PixelMplus12-Regular.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'PixelMplus12';
      src: url('./PixelMplus12-Bold.ttf') format('truetype');
      font-weight: bold;
      font-style: normal;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: 'PixelMplus12', monospace;
      padding: 14px;
    }
    .wrap {
      width: min(920px, 100%);
      border: 8px solid #444;
      background: #000;
      box-shadow: 0 0 30px rgba(90, 100, 255, 0.4);
      overflow: hidden;
    }
    .panel {
      padding: 12px;
      border-bottom: 4px solid #222;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      background: #151515;
    }
    .chip {
      font-size: 13px;
      padding: 6px 10px;
      border: 2px solid #333;
      background: #252525;
      color: #ddd;
      cursor: pointer;
    }
    .chip.active {
      border-color: #ffd866;
      background: #3a2c07;
      color: #ffe9aa;
    }
    .stage {
      position: relative;
      height: min(82vh, 780px);
      overflow-y: auto;
      padding: 16px 10px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #2c1810;
      transition: background 0.2s;
    }
    .stage.milestone {
      background: #5b4513;
    }
    .stage.milestone::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.9;
      background-image:
        radial-gradient(circle, rgba(255, 239, 153, 0.9) 0 1.3px, rgba(255, 239, 153, 0) 2px),
        radial-gradient(circle, rgba(255, 215, 96, 0.85) 0 1.1px, rgba(255, 215, 96, 0) 1.9px),
        radial-gradient(circle, rgba(255, 247, 201, 0.85) 0 0.9px, rgba(255, 247, 201, 0) 1.7px);
      background-size: 140px 140px, 170px 170px, 120px 120px;
      background-position: 0 -120px, 60px -180px, 110px -80px;
      animation: glitterFall 5.6s linear infinite;
    }
    .stage > * { position: relative; z-index: 1; }
    .art {
      width: 300px;
      height: 200px;
      border: 3px solid #1b1b1b;
      image-rendering: pixelated;
      background: linear-gradient(#0a0a2e, #1a1a4e 50%, #2c1810);
      margin-top: 8px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      color: #ffd700;
      text-shadow: 4px 4px 0 #000;
      letter-spacing: 2px;
      font-size: clamp(28px, 4vw, 42px);
    }
    .ordinal {
      color: #ffe89a;
      margin-bottom: 10px;
      font-size: 18px;
      text-shadow: 2px 2px 0 #000;
    }
    .celebrate {
      display: none;
      margin-right: 8px;
      color: #ffd700;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
    }
    .stage.milestone .celebrate {
      display: inline;
    }
    .desc {
      font-size: 15px;
      line-height: 1.8;
      color: #ddd;
      text-align: center;
      margin: 8px 0 14px;
    }
    .start {
      font-family: inherit;
      font-size: 20px;
      padding: 14px 28px;
      border: 4px solid #000;
      color: #fff;
      background: #e1452d;
      box-shadow: 6px 6px 0 #000;
    }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #bcbcbc;
      text-align: center;
    }
    @keyframes glitterFall {
      from { background-position: 0 -120px, 60px -180px, 110px -80px; }
      to { background-position: 0 520px, 60px 480px, 110px 560px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <button class="chip" data-mode="normal">通常</button>
      <button class="chip active" data-mode="100">100人目</button>
      <button class="chip" data-mode="150">150人目</button>
      <button class="chip" data-mode="200">200人目</button>
      <button class="chip" data-mode="250">250人目</button>
    </div>

    <div id="stage" class="stage milestone">
      <div class="art"></div>
      <h1 id="title">戻れメロス</h1>
      <div id="ordinal" class="ordinal"><span class="celebrate">祝！</span>あなたは 100人目のメロスです</div>
      <div class="desc">
        メロスは家に帰らなければならない<br>
        PC: スペースでジャンプ（2段まで）<br>
        スマホ: 画面タップでジャンプ（2段まで）
      </div>
      <button class="start">スタート</button>
      <div class="note">※ これは「節目タイトル演出」専用のローカルプレビューです（本番未反映）</div>
    </div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const title = document.getElementById('title');
    const ordinal = document.getElementById('ordinal');
    const chips = Array.from(document.querySelectorAll('.chip'));

    function setMode(mode) {
      chips.forEach((chip) => chip.classList.toggle('active', chip.dataset.mode === mode));
      if (mode === 'normal') {
        stage.classList.remove('milestone');
        title.textContent = '戻れメロス';
        ordinal.textContent = 'あなたは しらべちゅう の メロスです...';
        return;
      }
      const n = Number(mode || 0);
      stage.classList.add('milestone');
      title.textContent = '戻れメロス';
      ordinal.innerHTML = `<span class="celebrate">祝！</span>あなたは ${n}人目のメロスです`;
    }

    chips.forEach((chip) => {
      chip.addEventListener('click', () => setMode(chip.dataset.mode));
    });
    setMode('100');
  </script>
</body>
</html>
